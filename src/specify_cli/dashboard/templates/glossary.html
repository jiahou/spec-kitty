<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spec Kitty — Canonical Glossary</title>
<style>
:root {
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  --mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;

  --bg:           #A7C7E7;
  --surface:      #FFFDF7;
  --surface-hi:   #ffffff;
  --border:       rgba(44,62,80,0.10);
  --border-hi:    rgba(44,62,80,0.18);
  --text:         #2c3e50;
  --text-dim:     #546e7a;
  --text-bright:  #1a252f;

  --green:        #7BB661;
  --green-dim:    rgba(123,182,97,0.14);
  --green-dark:   #4a7a34;
  --yellow:       #FFF275;
  --yellow-dark:  #e6d836;
  --lavender:     #C9A0DC;
  --lavender-dim: rgba(201,160,220,0.18);
  --peach:        #FFD8B1;
  --peach-dim:    rgba(255,216,177,0.25);
  --peach-dark:   #c27a3a;

  --radius:       12px;
  --radius-sm:    6px;
  --shadow:       0 4px 12px rgba(0,0,0,0.10);
  --shadow-sm:    0 2px 6px rgba(0,0,0,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* ── HEADER ───────────────────────────────────────────────── */
.header {
  background: var(--surface);
  padding: 20px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.10);
  border-bottom: 3px solid var(--yellow-dark);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left { display: flex; align-items: center; gap: 16px; }

.logo-wrap {
  width: 52px; height: 52px;
  background: var(--surface-hi);
  border-radius: 14px;
  border: 2px solid rgba(123,182,97,0.3);
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}

.header-text h1 {
  font-size: 1.6em;
  color: var(--green);
  font-weight: 700;
  line-height: 1.1;
}
.header-text p {
  font-size: 0.8em;
  color: var(--text-dim);
  margin-top: 2px;
  font-family: var(--mono);
  letter-spacing: 0.02em;
}

.header-stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.stat-pill {
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 0.78em;
  font-weight: 600;
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  gap: 5px;
}
.stat-pill.total  { background: var(--green-dim);   color: var(--green-dark); border: 1px solid rgba(123,182,97,0.3); }
.stat-pill.active { background: var(--green-dim);   color: var(--green-dark); border: 1px solid rgba(123,182,97,0.3); }
.stat-pill.draft  { background: var(--lavender-dim);color: #7a4a9a;           border: 1px solid rgba(201,160,220,0.4); }
.stat-pill.depr   { background: var(--peach-dim);   color: var(--peach-dark); border: 1px solid rgba(255,216,177,0.5); }

/* ── APP SHELL ───────────────────────────────────────────── */
.dashboard-shell {
  display: flex;
  align-items: stretch;
  min-height: calc(100vh - 96px);
}
.sidebar {
  width: 232px;
  flex: 0 0 232px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  position: sticky;
  top: 96px;
  align-self: flex-start;
  height: calc(100vh - 96px);
}
.sidebar-section-header {
  padding: 14px 12px 8px;
  font-size: 0.72em;
  color: var(--text-dim);
  text-transform: uppercase;
  font-weight: 700;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  min-height: 38px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  color: var(--text);
  text-decoration: none;
  font-size: 0.9em;
  font-weight: 600;
}
.sidebar-item:hover { background: var(--green-dim); color: var(--green-dark); }
.sidebar-item.active {
  background: var(--green);
  color: #fff;
}
.glossary-content {
  flex: 1;
  min-width: 0;
}

/* ── TOOLBAR ──────────────────────────────────────────────── */
.toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  position: sticky;
  top: 83px;
  z-index: 99;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.validation-banner {
  margin: 18px 32px 0;
  padding: 12px 14px;
  background: #fff8db;
  border: 1px solid #e6c84c;
  border-left: 4px solid var(--yellow-dark);
  border-radius: var(--radius-sm);
  color: var(--text-bright);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  font-size: 0.9em;
  box-shadow: var(--shadow-sm);
}
.validation-banner.hidden { display: none; }
.validation-banner strong { font-weight: 700; }
.validation-banner code {
  font-family: var(--mono);
  background: rgba(255,255,255,0.7);
  border: 1px solid rgba(44,62,80,0.12);
  border-radius: 4px;
  padding: 2px 5px;
}
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 220px;
  max-width: 400px;
}
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
  font-size: 0.95em;
}
.search-input {
  width: 100%;
  padding: 8px 12px 8px 34px;
  border: 2px solid var(--lavender);
  border-radius: var(--radius-sm);
  font-size: 0.9em;
  font-family: var(--font);
  background: var(--surface-hi);
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus {
  outline: none;
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(123,182,97,0.2);
}
.search-input::placeholder { color: var(--text-dim); }

.filter-tabs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.tab {
  padding: 6px 14px;
  border-radius: 999px;
  border: 2px solid var(--border-hi);
  background: transparent;
  color: var(--text-dim);
  font-size: 0.82em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  font-family: var(--font);
}
.tab:hover { background: var(--green-dim); border-color: var(--green); color: var(--green-dark); }
.tab.active-tab { background: var(--green); border-color: var(--green); color: #fff; }

.result-count {
  font-size: 0.8em;
  color: var(--text-dim);
  white-space: nowrap;
  margin-left: auto;
  font-family: var(--mono);
}

/* ── ALPHA NAV ────────────────────────────────────────────── */
.alpha-nav {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  padding: 10px 32px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.alpha-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.8em;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--mono);
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.alpha-btn:hover { background: var(--green-dim); color: var(--green-dark); }
.alpha-btn.has-terms { color: var(--green-dark); }
.alpha-btn.inactive { opacity: 0.3; cursor: default; }

/* ── MAIN ─────────────────────────────────────────────────── */
.main { padding: 28px 32px 60px; max-width: 1400px; margin: 0 auto; }

.letter-section { margin-bottom: 32px; scroll-margin-top: 180px; }
.letter-heading {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.letter-char {
  font-size: 1.6em;
  font-weight: 800;
  color: var(--green);
  width: 44px; height: 44px;
  background: var(--surface);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
  border: 2px solid rgba(123,182,97,0.25);
}
.letter-rule { flex: 1; height: 1px; background: var(--border-hi); }

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}

/* ── TERM CARD ────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
  border-top: 3px solid var(--yellow-dark);
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.card[data-status="active"]     { border-top-color: var(--green); }
.card[data-status="draft"]      { border-top-color: var(--lavender); }
.card[data-status="deprecated"] { border-top-color: var(--peach); }

.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.card-surface {
  font-size: 1.0em;
  font-weight: 700;
  color: var(--text-bright);
  font-family: var(--mono);
  word-break: break-word;
  flex: 1;
}
.card[data-status="deprecated"] .card-surface {
  color: var(--text-dim);
  text-decoration: line-through;
  text-decoration-color: var(--peach-dark);
}

.badge {
  padding: 2px 9px;
  border-radius: 999px;
  font-size: 0.68em;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-active     { background: var(--green-dim);   color: var(--green-dark); border: 1px solid rgba(123,182,97,0.35); }
.badge-draft      { background: var(--lavender-dim);color: #7a4a9a; border: 1px solid rgba(201,160,220,0.4); }
.badge-deprecated { background: var(--peach-dim);   color: var(--peach-dark); border: 1px solid rgba(255,216,177,0.5); }

.card-def {
  font-size: 0.88em;
  color: var(--text-dim);
  line-height: 1.55;
}
.card[data-status="deprecated"] .card-def { font-style: italic; }

.card-foot {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 2px;
}
.conf-bar {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.conf-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--green);
  transition: width 0.3s;
}
.card[data-status="draft"] .conf-fill { background: var(--lavender); }
.card[data-status="deprecated"] .conf-fill { background: var(--peach); }
.conf-label {
  font-size: 0.7em;
  color: var(--text-dim);
  font-family: var(--mono);
  white-space: nowrap;
}

/* search highlight */
.hl { background: rgba(255,242,117,0.7); border-radius: 2px; color: var(--text-bright); }

/* empty state */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-icon { font-size: 3em; margin-bottom: 12px; }
.empty p { font-size: 1em; }

/* section hidden */
.letter-section.hidden { display: none; }
.card.hidden { display: none; }

/* ── FOOTER ───────────────────────────────────────────────── */
.footer {
  text-align: center;
  padding: 24px;
  font-size: 0.78em;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
  background: var(--surface);
  margin-top: 20px;
}
.footer a { color: var(--green-dark); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

@media (max-width: 600px) {
  .header { padding: 14px 16px; flex-wrap: wrap; gap: 12px; }
  .header-stats { order: 3; width: 100%; }
  .dashboard-shell { display: block; }
  .sidebar {
    position: static;
    width: auto;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    overflow-x: auto;
  }
  .sidebar-section-header { display: none; }
  .sidebar-item { width: auto; white-space: nowrap; flex: 0 0 auto; }
  .toolbar { padding: 10px 16px; top: 72px; }
  .alpha-nav { padding: 8px 16px; }
  .main { padding: 18px 16px 40px; }
  .cards-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<script>
let TERMS = [];
let VALIDATION_ERRORS = [];

// ── State ─────────────────────────────────────────────────
let filter = 'all';
let query  = '';

// ── Fetch & bootstrap ─────────────────────────────────────
async function loadTerms() {
  try {
    const resp = await fetch('/api/glossary-terms');
    if (!resp.ok) throw new Error('fetch failed');
    TERMS = await resp.json();
  } catch (e) {
    console.warn('glossary: could not load terms', e);
    TERMS = [];
  }
  try {
    const resp = await fetch('/api/glossary-health');
    if (!resp.ok) throw new Error('health fetch failed');
    const health = await resp.json();
    VALIDATION_ERRORS = Array.isArray(health.validation_errors) ? health.validation_errors : [];
  } catch (e) {
    console.warn('glossary: could not load health', e);
    VALIDATION_ERRORS = [];
  }
  renderValidationBanner();
  updateStats();
  buildAlphaNav();
  render();
}

function renderValidationBanner() {
  const banner = document.getElementById('validation-banner');
  if (!banner) return;
  if (!VALIDATION_ERRORS.length) {
    banner.classList.add('hidden');
    banner.innerHTML = '';
    return;
  }
  const first = VALIDATION_ERRORS[0] || {};
  const count = VALIDATION_ERRORS.length;
  const file = first.file ? String(first.file).split('/').pop() : 'seed file';
  const where = first.term_index === null || first.term_index === undefined ? 'file' : `term ${first.term_index}`;
  const field = first.field ? ` · ${first.field}` : '';
  const more = count > 1 ? ` · ${count - 1} more` : '';
  banner.classList.remove('hidden');
  banner.innerHTML = `
    <strong>Glossary validation warning</strong>
    <span>${count} validation ${count === 1 ? 'error' : 'errors'}; showing recovered terms only.</span>
    <code>${esc(file)} · ${esc(where)}${esc(field)}${esc(more)}</code>
  `;
}

function updateStats() {
  const total  = TERMS.length;
  const active = TERMS.filter(t => t.status === 'active').length;
  const draft  = TERMS.filter(t => t.status === 'draft').length;
  const depr   = TERMS.filter(t => t.status === 'deprecated').length;
  document.getElementById('header-stats').innerHTML = [
    `<span class="stat-pill total">📚 ${total} terms</span>`,
    `<span class="stat-pill active">✓ ${active} active</span>`,
    `<span class="stat-pill draft">◦ ${draft} draft</span>`,
    `<span class="stat-pill depr">~ ${depr} deprecated</span>`,
  ].join('');
}

// ── Build alphabet nav ─────────────────────────────────────
function buildAlphaNav() {

// ── Build alphabet nav ─────────────────────────────────────
  const lettersWithTerms = new Set(TERMS.map(t => t.surface[0].toUpperCase()));
  const alphaNav = document.getElementById('alpha-nav');
  alphaNav.innerHTML = '';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'alpha-btn' + (lettersWithTerms.has(ch) ? ' has-terms' : ' inactive');
    btn.textContent = ch;
    btn.setAttribute('aria-label', `Jump to ${ch}`);
    if (lettersWithTerms.has(ch)) {
      btn.onclick = () => {
        const sec = document.getElementById('sec-' + ch);
        if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
    }
    alphaNav.appendChild(btn);
  });
}

// ── Utilities ──────────────────────────────────────────────
function esc(s) {
  return s.replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const escaped = esc(text);
  if (!q) return escaped;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escaped.replaceAll(re, '<mark class="hl">$1</mark>');
}

function badgeClass(status) {
  return status === 'active' ? 'badge-active' : status === 'draft' ? 'badge-draft' : 'badge-deprecated';
}

function badgeLabel(status) {
  return status === 'active' ? 'active' : status === 'draft' ? 'draft' : 'deprecated';
}

// ── Render ─────────────────────────────────────────────────
function render() {
  const q = query.trim().toLowerCase();
  const main = document.getElementById('main');
  main.innerHTML = '';

  const filtered = TERMS.filter(t => {
    if (filter !== 'all' && t.status !== filter) return false;
    if (q) {
      return t.surface.toLowerCase().includes(q) || t.definition.toLowerCase().includes(q);
    }
    return true;
  });

  document.getElementById('result-count').textContent =
    filtered.length === TERMS.length ? `${TERMS.length} terms` : `${filtered.length} of ${TERMS.length}`;

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>No terms match "<strong>${esc(query)}</strong>"</p></div>`;
    return;
  }

  // Group by first letter
  const groups = {};
  filtered.forEach(t => {
    const ch = t.surface[0].toUpperCase();
    (groups[ch] = groups[ch] || []).push(t);
  });

  Object.keys(groups).sort().forEach(ch => {
    const section = document.createElement('section');
    section.className = 'letter-section';
    section.id = 'sec-' + ch;

    section.innerHTML = `
      <div class="letter-heading">
        <div class="letter-char">${ch}</div>
        <div class="letter-rule"></div>
      </div>
      <div class="cards-grid" id="grid-${ch}"></div>
    `;
    main.appendChild(section);

    const grid = section.querySelector('.cards-grid');
    groups[ch].forEach(t => {
      const pct = Math.round(t.confidence * 100);
      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.status = t.status;
      card.innerHTML = `
        <div class="card-head">
          <div class="card-surface">${highlight(t.surface, q)}</div>
          <span class="badge ${badgeClass(t.status)}">${badgeLabel(t.status)}</span>
        </div>
        <div class="card-def">${highlight(t.definition, q)}</div>
        <div class="card-foot">
          <div class="conf-bar" title="${pct}% confidence">
            <div class="conf-fill" style="width:${pct}%"></div>
          </div>
          <span class="conf-label">${pct}%</span>
        </div>
      `;
      grid.appendChild(card);
    });
  });
}

// ── Event wiring ───────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

document.getElementById('filter-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  filter = btn.dataset.filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
  btn.classList.add('active-tab');
  render();
});

document.addEventListener('DOMContentLoaded', loadTerms);
</script>
</body>
