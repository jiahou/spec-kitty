schema_version: "1.0"
id: planning-and-tracking
title: Planning & Tracking Styleguide
scope: operations
applies_to_languages: []

principles:
  - "Functional epics own work; meta-trackers only reference it. An epic must represent a real domain of work — a subsystem, a capability, or a bug-class — and own its tickets as native sub-issues. A release/stabilization/go-no-go rollup is not a domain of work: it gates via milestones or labels and references work by checklist, never as the canonical parent. Prefix such issues `META-TRACKER:` so their role is unmistakable."
  - "No open ticket lives under a closed or superseded parent. Open tickets parented under a closed or split epic look tracked but are invisible. Sweep closed epics for open children and rehome them to a live functional epic."
  - "Collapse passthrough tiers. An epic that has become a one-child passthrough is a redundant tier — close it as superseded and promote the child to the surviving parent."
  - "Tiered granularity: root -> coherent buckets -> leaves. A root epic holds buckets (sub-epics for distinct sub-classes), not a flat pile of mixed-granularity tickets. A root that mixes sub-epics, loose bugs, and unrelated tickets has drifted into a catch-all and must be re-sliced."
  - "Community-precedence on duplicates. When two non-umbrella tickets duplicate, keep the community-authored one (author association NONE) and close the core-team duplicate — but only after migrating its evidence into the survivor. Never greet a contributor with a bare duplicate-closed. Verify a stale community ticket is truly dead, and comment inviting confirmation, before closing."
  - "Reuse canonical epics; do not fork near-duplicates. Before creating an epic, search for an existing one whose charter already covers the domain and nest a focused slice under it rather than spawning a sibling."
  - "Read scope, flag overlaps. Read a ticket body before re-parenting it — do not keyword-match blindly. When one concern spans several epics, flag the overlap for an owner rather than silently picking one parent."
  - "Create a bucket when a coherent orphan cluster appears. Roughly four or more orphan tickets sharing a concern with no owning epic justify a new functional epic. Name it for the user value it delivers, not internal jargon."
  - "An epic body carries Purpose, Scope, and Out-of-scope — never a list of child ticket numbers. The native sub-issue graph is the single source of truth for parent/child membership; a hand-maintained checklist of numbers drifts and is invisible to tooling."
  - "Hygiene invariants for every open ticket: it resolves to a functional epic (not an orphan, not meta-rooted, not under a closed epic); it carries an issue type; and it carries a priority label. Type is objective — derive it from the conventional-commit prefix and labels. Priority is triage — assign `priority:P2` as the canonical provisional default and add `triage:needs-revision` as the flag, rather than silently guessing. Two operators applying this rule will converge on the same labels."
  - "Issue-matrix discipline. At spec time, for ticket-based missions, every issue the mission addresses must be listed in the issue-matrix with a verdict: in-scope, out-of-scope, or deferred. In-scope issues receive a claim — assigned to the operator — and a tracker comment naming the mission. This is the canonical location for this discipline; it is the operationalized form of the tracker-hygiene standing order: at spec time, every addressed issue → issue-matrix row + claim (assign operator) + tracker comment naming the mission."

patterns:
  - name: Single canonical priority label
    description: >
      Use exactly one priority label per ticket from the canonical
      `priority:P0`..`priority:P3` scale. The legacy Px-description labels
      (P0-critical, P1-bug, P2-enhancement, P3-future, P4-wontfix) conflated
      priority with type and are retired. Priority is orthogonal to issue type.
    bad_example: |
      Labels on one ticket: priority:P1, P1-bug, P2-enhancement
      (dual/conflicting priority + type smuggled into a priority label)
    good_example: |
      Labels on one ticket: priority:P1, bug
      (one canonical priority; kind expressed via the issue type, not a label)

  - name: Issue type mirrors the bug label
    description: >
      Keep issue type and the `bug` label consistent: a ticket with the `bug`
      label is typed Bug, and a Bug-typed ticket carries the `bug` label. Epics
      are typed Feature. Type is the kind of work; it is derived objectively
      from the conventional-commit prefix and existing labels.
    bad_example: |
      Ticket labelled `bug` but typed Task; epic left untyped.
    good_example: |
      `bug` label <-> type Bug; every epic typed Feature.

  - name: Triage namespace for pending disposition
    description: >
      Mark a ticket's pending disposition with the cross-priority `triage:*`
      namespace rather than overloading priority. `triage:stale` (reproduce and
      close if no longer valid), `triage:needs-revision` (scope/spec needs
      rework), `triage:maybe-duplicate` (suspected duplicate pending
      confirmation — distinct from the confirmed `duplicate` label). Use the
      `usability` label for operator/UX-ergonomics concerns and `future` for
      explicitly-deferred work.
    good_example: |
      A suspected-but-unconfirmed dup: add `triage:maybe-duplicate`
      (NOT `duplicate`, which asserts a confirmed, closeable duplicate).

  - name: Triage-snapshot label reconciliation
    description: >
      When a ticket carries a bespoke triage-snapshot label scheme from a
      prior pass (e.g. `p1:verified`, `p1-decision:keep|split|defer|close-if-stale`),
      reconcile it into the canonical namespaces or explicitly bless it as an
      immutable audit snapshot. Migration map:
      `p1-decision:close-if-stale` → `triage:stale`;
      `p1-decision:defer` → `future`;
      `p1:verified` → remove (disposition is captured by the canonical priority label).
      If the snapshot predates the current canonical scheme and the owning team
      treats it as an audit artefact, document the decision and leave it
      untouched — but add the canonical `priority:Px` and `triage:*` labels
      alongside so the quality-test can answer its question in one pass.
    good_example: |
      Ticket carrying `p1-decision:split` migrated: label removed, `triage:needs-revision`
      added alongside existing `priority:P1`. Quality-test can answer in one pass.
    bad_example: |
      Ticket carries `p1:verified` + `p1-decision:keep` with no canonical
      `priority:Px` label. The quality-test cannot answer its question and the
      canonical triage namespace is bypassed.

  - name: Secondary-label coexistence
    description: >
      Secondary labels (`usability`, `future`, `bug`, `epic`, `enhancement`)
      coexist with the `priority:Px` primary label and with `triage:*` disposition
      labels. They are orthogonal dimensions: `bug` expresses kind, `priority:P1`
      expresses urgency, `triage:stale` expresses triage state. No label from one
      dimension replaces a label from another. A ticket may carry at most one
      `priority:Px` label (the single-canonical-priority invariant), any number of
      kind labels, and at most one `triage:*` label per triage cycle.
    good_example: |
      Labels: priority:P1, bug, triage:needs-revision
      (one priority, one kind, one triage state — all orthogonal)
    bad_example: |
      Labels: P1-bug, triage:stale
      (conflated priority+kind; missing canonical priority:Px)

  - name: Value-named epic with a Purpose/Scope body
    description: >
      Name an epic for the user value it delivers, not for internal jargon.
      The body states Purpose, Scope, and Out-of-scope and stops there — child
      membership is read from the native sub-issue graph.
    bad_example: |
      Title: "Proof Surface"; body lists "- #1201 - #1202 - #1203 ...".
    good_example: |
      Title: "CLI user experience"; body: Purpose / Scope / Out-of-scope only.

anti_patterns:
  - name: Meta-tracker as canonical parent
    description: >
      Making a release/go-no-go/stabilization rollup the canonical parent of
      functional tickets hides real ownership: the work appears tracked but its
      true functional home is unknown, and closing the release issue orphans
      everything beneath it. Release gating belongs in milestones or labels.
    bad_example: |
      "3.2.0 release tracker" set as the native parent of a CLI bug and a
      runtime refactor.
    good_example: |
      Bug parented under the CLI-UX functional epic; refactor under the
      runtime epic; both referenced from the release rollup by checklist, and
      the rollup titled `META-TRACKER: 3.2.0 release`.

  - name: Child-ticket checklist in the epic body
    description: >
      A hand-maintained list of child ticket numbers in an epic body drifts out
      of sync with the native sub-issue graph and is invisible to tooling that
      reads parent/child via the API. The graph is the source of truth.
    bad_example: |
      Epic body: "## Children\n- [ ] #1101\n- [x] #1102\n- [ ] #1103"
    good_example: |
      Epic body: Purpose / Scope / Out-of-scope. Children linked as native
      sub-issues; the body lists none.

  - name: Closing a community duplicate before migrating its evidence
    description: >
      Closing a contributor's ticket as a duplicate without first moving its
      reproduction steps, logs, and discussion into the survivor loses evidence
      and alienates the contributor. Community-authored tickets take precedence
      over core-team duplicates.
    bad_example: |
      `gh issue close <community#> --reason "not planned" --comment "dup"`
      while keeping the core-team ticket open and unenriched.
    good_example: |
      Migrate evidence into the community ticket, close the core-team
      duplicate, and comment on the community ticket inviting confirmation.

tooling:
  github-cli: "src/doctrine/toolguides/built-in/GITHUB_TRACKER.md (gh CLI + GraphQL mechanics for sub-issues, types, and parent walks)"

quality_test: >
  For any open ticket, can you answer in one pass: which functional epic owns
  it (not a meta-tracker, not a closed epic), what its issue type is, and what
  its single canonical priority is — without consulting a hand-maintained
  checklist?

references:
  - ".kittify/glossaries/planning-and-tracking.yaml"
  - "src/doctrine/toolguides/built-in/github-tracker.toolguide.yaml"
  - "src/doctrine/styleguides/built-in/tiered-standards.styleguide.yaml"
  - "src/doctrine/tactics/built-in/ownership-map-leeway.tactic.yaml"
  - "src/doctrine/tactics/built-in/reviewer-implementer-role-separation.tactic.yaml"
