schema_version: "1.0"
id: tiered-standards
title: Tiered Coding Standards
scope: code

principles:
  - "Rigour must match risk: the closer a package is to mission-critical state management or runtime execution, the higher the quality bar it must meet."
  - "Core packages own the invariants: status transitions, merge orchestration, dependency resolution, and mission runtime are load-bearing — they must be covered, typed, and lint-clean at all times."
  - "Glue packages connect and delegate: CLI command shells, upgrade migrations, and render helpers orchestrate core behaviour and need integration coverage but may tolerate lighter unit-coverage targets."
  - "Scripting packages are not production surfaces: shims, one-off scripts, and exploratory code operate under relaxed rules and must never bleed their laxity into core or glue packages."
  - "Debt is not invisible: pre-existing failures in any tier must be recorded before handoff — never hidden inside new work."
  - "Boundaries must not be crossed downward: core packages must not import from glue or scripting packages; glue packages must not import from scripting packages."

patterns:
  - name: Core Tier Standards
    description: >
      Load-bearing state, orchestration, and runtime logic whose correctness
      determines mission execution outcomes. A bug here can corrupt mission state
      or silently drop transitions.
      Packages: src/specify_cli/status/, src/specify_cli/merge/, src/specify_cli/core/,
      src/mission_runtime/, src/doctrine/drg/.
    good_example: |
      # Core tier rigour applied to src/specify_cli/status/reducer.py
      # coverage : >=85% line coverage for new code; no new untested public functions
      # duplication: No copy-paste duplication of business logic; extract shared helpers
      # smell    : Complexity ceiling 15 (ruff C901 / Sonar S3776); no dead code paths
      # lint     : ruff check with zero issues; no blanket noqa suppressions
      # typing   : mypy --strict with zero errors; no bare Any or type: ignore without rationale

  - name: Glue Tier Standards
    description: >
      Integration and orchestration packages that wire core logic to CLI surfaces,
      agent interfaces, upgrade pipelines, and external tooling. Correctness matters
      but the risk profile is lower: failures here surface quickly as CLI errors
      rather than silent state corruption.
      Packages: src/specify_cli/cli/, src/specify_cli/upgrade/,
      src/specify_cli/diagnostics/, src/specify_cli/runtime/.
    good_example: |
      # Glue tier rigour applied to src/specify_cli/cli/commands/merge.py
      # coverage  : >=70% line coverage for new code; integration tests preferred over unit stubs
      # duplication: Extract repeated argument-parsing or output-formatting helpers;
      #              tolerate minor cosmetic duplication
      # smell     : Complexity ceiling 15; flag but do not block on pre-existing violations
      # lint      : ruff check with zero issues
      # typing    : mypy --strict with zero errors on new code; pre-existing ignores must be documented

  - name: Scripting Tier Standards
    description: >
      Shims, one-off scripts, and exploratory utilities not on the production
      execution path. Code here must clearly be marked as non-production and must
      never be imported by core or glue packages.
      Packages: src/specify_cli/shims/, src/specify_cli/scripts/.
    good_example: |
      # Scripting tier rigour applied to src/specify_cli/scripts/one_off_migration.py
      # coverage  : No mandatory coverage gate; smoke test if the script has a CLI entry point
      # duplication: No constraint; scripts are often intentionally self-contained
      # smell     : No automated gate; flag egregious issues during review
      # lint      : ruff check with zero issues
      # typing    : Type hints encouraged but not enforced; mypy may run in non-strict mode

anti_patterns:
  - name: Uniform Standards Across All Packages
    description: >
      Applying the same coverage and duplication targets to CLI shells and shims as
      to the status reducer or merge executor creates false confidence and wastes
      effort. CLI shells are best covered by integration tests; demanding 90% unit
      coverage there produces mock-heavy tests that obscure real behaviour.
    bad_example: |
      # CI enforces 90% coverage on every module equally, including cli/commands/
      # — results in over-mocked unit tests for thin command shells that provide
      # no real confidence.
    good_example: |
      # Core modules (status/, merge/) require >=85% and mypy --strict.
      # CLI command shells require integration-level coverage at the command boundary,
      # not unit tests of every argument-parsing branch.

  - name: Importing Core Logic from Scripting Packages
    description: >
      A scripting or shim package that imports from a core package pulls that
      dependency into a low-rigour tier, making it harder to reason about the
      core's invariants. Shims and scripts must consume core behaviour via the
      published CLI or public API, not by direct import.
    bad_example: |
      # src/specify_cli/shims/legacy_bridge.py
      from specify_cli.status.reducer import materialize  # direct core import
    good_example: |
      # src/specify_cli/shims/legacy_bridge.py
      import subprocess
      result = subprocess.run(["spec-kitty", "agent", "tasks", "status"], capture_output=True)

  - name: Hiding Pre-existing Debt in New Work
    description: >
      Adding new code alongside broken tests, lint failures, or type errors in the
      same commit without noting the pre-existing state. Reviewers cannot tell which
      failures are new without archaeology.
    bad_example: |
      # PR adds 200 lines to src/specify_cli/status/reducer.py
      # and silently inherits 3 pre-existing mypy errors.
      # Reviewer cannot distinguish new from old.
    good_example: |
      # PR description: "Pre-existing mypy errors in reducer.py: 3 (unrelated to this diff).
      # New code passes mypy --strict on its own surface."

quality_test: >
  Can a reviewer, without running the test suite, look at a changed module's
  package path and immediately know what coverage, typing, and lint bar applies —
  and confirm the new code meets it?

references:
  - "src/doctrine/directives/built-in/030-test-and-typecheck-quality-gate.directive.yaml"
  - "src/doctrine/directives/built-in/025-boy-scout-rule.directive.yaml"
  - "src/doctrine/directives/built-in/001-architectural-integrity-standard.directive.yaml"
