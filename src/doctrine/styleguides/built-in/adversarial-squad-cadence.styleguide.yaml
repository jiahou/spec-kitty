schema_version: "1.0"
id: adversarial-squad-cadence
title: Adversarial Squad Cadence
scope: operations

principles:
  - >
    Run a bounded multi-profile adversarial squad at each planning point-cut as strong
    guidance, not a gate. A mission is not blocked for skipping the squad.
  - >
    Canonical trigger points for the squad cadence: post-spec (scope and prior-art check),
    post-plan (brownfield foldable-issue and split-brain check), post-tasks (anti-laziness
    and decomposition realism check), and at mission sizing (effort and risk calibration).
  - >
    A squad bounded to 3-5 distinct profile perspectives is typical. More delegates is not
    better — distinct lenses are. A 20-30 minute bounded squad is preferable to an unbounded
    sprawl.
  - >
    This styleguide governs the cadence — the when and why of running a squad. The squad
    playbook (profile selection, point-cut definitions, model-discipline rules, anti-patterns)
    lives in adversarial-squad-deployment.procedure. Do not restate the playbook here;
    reference it.
  - >
    The squad is optional and charter- or memory-activated enrichment, never a mission gate.
    Hard-wiring a squad run as a required gate contradicts the shipped procedure's optional
    invariant and is named as an anti-pattern in that procedure. No enforcement of squad
    participation is permitted.
  - >
    This styleguide folds experiment #2094 (multi-squad pre-flight cadence; closed on land
    with a tracker comment referencing mission doctrine-catfooding-2196).

patterns:
  - name: Post-tasks anti-laziness squad
    description: >
      After /spec-kitty.tasks and before claiming the first WP, dispatch a bounded squad to
      audit the work-package decomposition for fakeable DoDs, undersized scope, and missing
      coverage. Record convergent findings in the tasks document or as a pre-implementation
      note. This is the highest-value point-cut: finding decomposition gaps before
      implementation avoids costly mid-WP scope expansions.
    good_example: |
      # Trigger: tasks finalized, first WP not yet claimed
      # Profiles: architect-alphonso (structure), debugger-debbie (live-evidence coverage),
      #           paula-patterns (decomposition realism), randy-reducer (duplication/overlap)
      # Sharp question: "Are the DoDs fakeable? Is any WP materially undersized?"
      # Output: convergent findings recorded in tasks.md amendment section;
      #         mission proceeds regardless — squad is advisory only

  - name: Post-plan brownfield squad
    description: >
      After /spec-kitty.plan, dispatch a focused squad to surface foldable issues,
      split-brain surface risks, and deprecation debt the plan may have missed. The squad
      runs advisory — findings inform the tasks step, not block it.
    good_example: |
      # Trigger: plan.md complete, /spec-kitty.tasks not yet run
      # Profiles: researcher-ryan (prior-art and related issues),
      #           architect-alphonso (split-brain risk)
      # Sharp question: "What has this plan missed that /spec-kitty.tasks should address?"
      # Output: research.md or plan.md amendment; tasks step proceeds regardless

anti_patterns:
  - name: Gate-hardwiring
    description: >
      Treating the squad as a required mission gate blocks legitimate work and contradicts
      the adversarial-squad-deployment procedure's invariant that the squad is optional and
      charter-activated enrichment. Squads enrich; they do not block.
    bad_example: |
      # Bad: status transition blocked until squad run is documented
      if not squad_evidence_present(wp):
          raise StatusGateError("Squad run required before claiming WP")
    good_example: |
      # Good: squad is run at point-cut as guidance; work proceeds regardless
      run_squad_if_chartered(point_cut="post-tasks")  # advisory, not gating
      claim_work_package(wp)  # proceeds independently of squad outcome

  - name: Playbook restatement
    description: >
      Copying the squad playbook (profile selection order, point-cut definitions,
      anti-pattern list, model-discipline rules) from adversarial-squad-deployment.procedure
      into this or any other artifact creates a split-brain authority.
      Reference the procedure; do not restate it.
    bad_example: |
      # Bad: restating procedure steps inside cadence guidance
      # "1. Select 3-4 profiles by lens. 2. Dispatch in parallel.
      #  3. Require structured output. 4. Synthesize..."
    good_example: |
      # Good: cadence guidance references the procedure for execution details
      # "For the squad execution playbook (profile selection, dispatch discipline,
      #  synthesis, anti-patterns), see adversarial-squad-deployment.procedure."

quality_test: >
  Can a practitioner read this styleguide and immediately know (a) at which workflow
  point-cuts to consider running a squad, (b) that the squad is guidance not a gate, and
  (c) where to find the execution playbook — without this styleguide restating the playbook?

references:
  - "src/doctrine/procedures/built-in/adversarial-squad-deployment.procedure.yaml"
  - "src/doctrine/paradigms/built-in/brownfield-onboarding.paradigm.yaml"
