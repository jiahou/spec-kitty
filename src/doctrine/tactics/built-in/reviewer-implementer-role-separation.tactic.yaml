schema_version: "1.0"
id: reviewer-implementer-role-separation
name: Reviewer/Implementer Role Separation
purpose: >
  Ensure that the agent or session that implements a work package is never
  the same agent or session that reviews it. Role separation prevents review
  bias, preserves the independence of the review gate, and ensures that the
  governing doctrine profile switches correctly between the implement and
  review phases.
steps:
  - title: Identify the implementing and reviewing profiles
    description: >
      Every work package must be assigned a distinct implementer profile and
      a distinct reviewer profile. For Spec Kitty software-dev missions, the
      canonical profile assignments are: implement step — implementer-ivan
      (or a language-specific variant such as python-pedro or java-jenny);
      review step — reviewer-renata. These assignments are operationalized in
      src/doctrine/missions/software-dev/mission-runtime.yaml and the
      review/implement mission-step prompts — this tactic provides the
      doctrine-layer rationale and constraint, not new wiring.
  - title: Do not review your own implementation
    description: >
      An agent or session that implemented a WP must not load the reviewer
      profile and perform the review of that same WP. If the same operator
      must continue, open a new session, load the reviewer profile explicitly
      via /ad-hoc-profile-load, and treat the prior implementation as
      external work to be reviewed with fresh eyes.
    examples:
      - "Wrong: same Claude session implements WP04 then immediately loads reviewer-renata and reviews WP04."
      - "Correct: implementation session moves WP04 to for_review; a separate session or context loads reviewer-renata."
  - title: Update agent_profile in the WP frontmatter before handoff
    description: >
      Before moving a WP to for_review, update the agent_profile field in
      the WP prompt frontmatter to the reviewer profile (e.g. reviewer-renata).
      This ensures the reviewing agent loads the correct governance context.
      Before moving a WP back to in_progress after a rejection, restore
      agent_profile to the implementer profile.
    examples:
      - "Pre-review handoff: set agent_profile: reviewer-renata in the WP frontmatter."
      - "Post-rejection: restore agent_profile: implementer-ivan (or language-specific profile) in the WP frontmatter."
failure_modes:
  - "The same session implements and reviews a WP — the review carries zero independence and misses the bias-correction the reviewer profile provides."
  - "The agent_profile field is left as the implementer profile when the WP moves to for_review, causing the reviewer to load the wrong governance context."
  - "Adding redundant profile wiring in this tactic that conflicts with or duplicates mission-runtime.yaml — changes to profile routing belong in mission-runtime.yaml, not here."
references:
  - name: Planning and Tracking Styleguide
    type: styleguide
    id: planning-and-tracking
    when: >
      Use when planning task decomposition to understand the role-separation
      discipline that governs who reviews each work package.
notes: >
  The operationalized profile assignments are in
  src/doctrine/missions/software-dev/mission-runtime.yaml:
    implement step — agent-profile: implementer-ivan
    review step   — agent-profile: reviewer-renata
  and confirmed in the review/implement mission-step prompts under
  src/doctrine/missions/mission-steps/software-dev/.
  This tactic adds the doctrine-layer rationale and constraint — it does NOT
  introduce new profile wiring or override mission-runtime.yaml. Changes to
  which profile is used for implement or review must go in mission-runtime.yaml
  and the step contracts, not here.
