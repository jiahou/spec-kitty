schema_version: "1.0"
name: Common Docs Write
id: common-docs-write
purpose: >
  How to author the body and frontmatter of a Common Doc to the styleguide so the
  page passes its live gates: write the SEO description inside the 50-180 character
  band, express cross-references as the related: resolvable-path form, match the
  Divio type to the owning section, and follow the kebab-case naming convention.
  Use this once the page exists (scaffolded) and you are writing its content.
steps:
  - title: Match the Divio type to the section
    description: >
      Write the page as the Divio documentation type its section implies and keep
      one concern per file. Tutorials and guides/ are learning- and task-oriented;
      api/ and configuration/ are reference; architecture/ and adr/ are
      explanation (the why). Do not blend a how-to and a design rationale in one
      file — split them and cross-link with related:.
    examples:
      - "guides/open-the-dashboard.md is a task-oriented how-to; the why lives in an architecture/ explanation it links to."
      - "api/ pages are reference and are often generated; do not hand-write narrative explanation into them."
  - title: Write the SEO description inside the band
    description: >
      Author the frontmatter description as a single string of 50-180 characters
      inclusive — the SEO post-processing step rejects descriptions outside that
      band. Make it a real summary of the page, not a placeholder; the
      page-inventory lockfile freshness gate counts the characters.
    examples:
      - "A 120-character description that states what the page lets the reader do, within the 50-180 band."
      - "Rejected: a 30-character stub like 'Dashboard docs' that falls below the 50-character floor."
  - title: "Express cross-references as related: resolvable paths"
    description: >
      Link to other docs through the related: frontmatter list of repo-relative
      .md paths, each of which must resolve to an existing file — the related:
      path validator checks every entry. Do not reintroduce the dead citation_refs
      sidecar field and do not bury cross-references only in prose where no gate
      can see them.
    examples:
      - "related: [ ../architecture/charter-activation.md, ../adr/3.x/2026-05-16-1-doctrine-layer-merge-semantics.md ] — both paths resolve."
      - "Rejected: related: [ ../architecture/does-not-exist.md ] — the validator fails the dangling reference."
  - title: Keep naming and lifecycle keys conventional
    description: >
      Use lowercase kebab-case file and directory names (ADR filenames keep their
      dated prefix), carry the namespaced doc_status (draft | active | deprecated |
      superseded) rather than a bare status key, and refresh updated: YYYY-MM-DD
      whenever the body changes. Apply the styleguide rather than improvising; each
      of these rules maps to a named live check in its rule-to-check table.
    examples:
      - "Renaming Open_Dashboard.md to open-dashboard.md to satisfy kebab-case naming."
      - "Flipping doc_status: draft -> active and bumping updated: when the page is finalised."
failure_modes:
  - "The description is shorter than 50 or longer than 180 characters and the lockfile freshness gate rejects it."
  - "A cross-reference is written in prose or as citation_refs instead of a resolvable related: path, so no gate can verify it."
  - "A related: entry points at a path that does not resolve and the validator fails."
  - "A how-to and a design rationale are merged into one file, breaking the one-concern-per-file and Divio-type conventions."
references:
  - name: Common Docs Styleguide
    type: styleguide
    id: common-docs
    when: "Consult throughout authoring to apply the frontmatter schema, the 50-180 description band, related: paths, Divio type, and naming."
  - name: Common Docs Documentation Standard
    type: directive
    id: DIRECTIVE_042
    when: Consult to apply the binding frontmatter-SSOT and doc_status rules the styleguide conventions enforce.
