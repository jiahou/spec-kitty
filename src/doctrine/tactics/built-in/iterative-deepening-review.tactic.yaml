schema_version: "1.0"
id: iterative-deepening-review
name: Iterative-Deepening Review
purpose: >
  Review a large backlog for linkage and grouping in widening time windows
  rather than one flat pass, so recent drift and emergent groupings are caught
  first while context is fresh and effort drops sharply per ring as later rings
  slot into structure that already exists.
steps:
  - title: Sweep in widening time windows
    description: >
      Process the backlog as concentric rings of increasing age — 3-day, then
      week, then fortnight, then month — instead of a single undifferentiated
      pass. Recent churn is where drift and emergent groupings live, so handling
      it first means later rings slot into structure that already exists. Each
      widening ring is mostly already-linked by the previous ring, so the orphan
      count falls sharply per ring.
    examples:
      - "Ring counts from a real sweep fell roughly 1, then 8, then 3, then 4 orphans per ring — the bulk of the older backlog was already parented by the time the rings reached it."
  - title: Scope each ring with a batched parent lookup
    description: >
      Before working a ring, scope its orphan set with one batched query (for
      GitHub, a single aliased GraphQL parent-lookup over the ring's tickets)
      rather than per-ticket calls. This is both cheaper and avoids the
      per-request rate-limit trap that silently returns empty results on rapid
      fan-out.
  - title: Promote emergent groupings to epics before the next ring
    description: >
      When a coherent cluster surfaces in a ring, create its functional epic
      immediately so the next ring's tickets slot into it instead of
      re-deriving the group. Emergent groupings surface ring-by-ring (for
      example a session-presence cluster at the 3-day ring, an agent-harness
      cluster at the week ring) and become structure for everything wider.
  - title: Terminate with an older-than-month close-out sweep
    description: >
      Close out with a single sweep of everything older than the last ring.
      Count its orphans first with a cheap batched query, confirm the set is
      small, then do one pass. Most old tickets are already handled by earlier
      rings; only a handful are true orphans needing a home.
    examples:
      - "An 82-ticket older-than-month close-out resolved to only 9 genuine orphans, all homed in a single pass."
  - title: Let later rings audit earlier rings
    description: >
      A regression introduced mid-sweep — for example a dual-priority conflict
      created while re-labelling — is caught by a later ring's audit instead of
      shipping silently. Treat each ring as both a forward sweep and a check on
      the prior ring's changes.
failure_modes:
  - "Flat single-pass review that buries fresh drift under stale backlog and re-derives groupings repeatedly."
  - "Per-ticket parent lookups that trip secondary rate limits and silently return empty parent sets."
  - "Deferring epic creation until after a full pass, so emergent clusters are re-discovered in every ring."
  - "Skipping the older-than-month close-out and leaving a long tail of true orphans unhomed."
applies_to_languages: []
notes: >
  Distilled from a full-backlog tracker remediation (235 open tickets). The
  ring cadence (3-day, week, fortnight, month, older-than-month close-out) is a
  starting calibration, not a fixed law — widen or narrow the rings to match how
  fast the backlog churns. Pairs with the tracker-organisation-workflow
  procedure (which it sequences) and the moscow-scoping-lens tactic (for scoping
  what each emergent epic carries).
references:
  - name: Tracker Organisation Workflow
    type: procedure
    id: tracker-organisation-workflow
    when: Sequencing the tracker-wide organisation sweep into widening rings.
  - name: MoSCoW Scoping Lens
    type: tactic
    id: moscow-scoping-lens
    when: Scoping what an emergent epic must, should, could, or won't carry once a ring surfaces it.
