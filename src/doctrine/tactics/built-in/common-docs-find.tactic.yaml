schema_version: "1.0"
name: Common Docs Find
id: common-docs-find
purpose: >
  How to locate the doc that owns a topic without a hand-maintained lookup table:
  resolve the topic through the doctrine relation graph and the page-inventory
  lockfile, which are both regenerated from source, so the answer tracks the real
  documentation rather than a static index that rots. Use this before writing a
  new page (to avoid duplicating an existing one) and when navigating the corpus.
steps:
  - title: Reject the static lookup table
    description: >
      Do not resolve a topic against a hand-maintained topic->path table; such a
      table is not adopted by the Common Docs standard precisely because it drifts
      from the corpus the moment a page moves. Find through the two regenerated,
      freshness-gated authorities instead: the doctrine relation graph and the
      page-inventory lockfile.
    examples:
      - "Rejected: grepping a curated docs-index.md that lists topics and paths by hand."
      - "Adopted: querying the regenerated page-inventory lockfile and the DRG, both of which a freshness gate keeps in sync with source."
  - title: Resolve through the DRG
    description: >
      Use the doctrine relation graph (src/doctrine/graph.yaml) to find the
      governing directive, styleguide, and tactics for a documentation concern and
      to follow their relations. The graph is generated by
      spec-kitty doctrine regenerate-graph and freshness-gated, so its nodes and
      edges reflect the current artifacts, not a remembered map.
    examples:
      - "Following directive:DIRECTIVE_042 -> styleguide:common-docs -> tactic:common-docs-write to reach the authoring conventions for a doc concern."
      - "Confirming a Common Docs governing artifact exists as a node before assuming a topic is ungoverned."
  - title: Resolve through the page-inventory lockfile
    description: >
      Search the page-inventory lockfile — the rollup regenerated FROM in-file
      frontmatter — by section, title, doc_status, or related: edges to find the
      page that owns a topic and its current lifecycle. Because the lockfile is
      derived from frontmatter and freshness-gated (WP04), a match points at a
      page that actually exists with the metadata it actually carries.
    examples:
      - "Filtering the lockfile to section: guides and doc_status: active to find the live how-to for a task."
      - "Looking up a topic and discovering its page is doc_status: deprecated, so the live answer is the ADR it was distilled into."
  - title: Confirm the source is fresh before trusting the answer
    description: >
      Treat a stale graph or lockfile as untrustworthy: run the DRG freshness
      gate (and rely on the WP04 lockfile freshness gate) so the authority you
      searched matches source. If a gate is red, regenerate before concluding a
      doc does or does not exist.
    examples:
      - "spec-kitty doctrine regenerate-graph --check returns exit 0 before trusting a DRG traversal."
      - "A red lockfile freshness gate means regenerate first; a 'not found' against a stale lockfile is not a real absence."
failure_modes:
  - "A topic is resolved against a hand-maintained lookup table that has drifted from the corpus, returning a moved or deleted page."
  - "A 'not found' verdict is trusted against a stale graph or lockfile, so an existing page is duplicated."
  - "The lockfile is read as a parallel SSOT rather than as a rollup regenerated from frontmatter."
references:
  - name: Common Docs Documentation Standard
    type: directive
    id: DIRECTIVE_042
    when: Consult to apply the frontmatter-SSOT and generated-lockfile rules that make the DRG and page-inventory the authorities to search.
  - name: Common Docs Styleguide
    type: styleguide
    id: common-docs
    when: Consult to read the frontmatter fields (section, doc_status, related:) the lockfile and DRG expose for resolution.
