schema_version: "1.0"
id: moscow-scoping-lens
name: MoSCoW Scoping Lens
purpose: >
  Apply MoSCoW — Must, Should, Could, Won't — as a scoping discipline when
  negotiating the boundary of a mission or a backlog slice, so the smallest
  viable Must set is committed and everything else is explicitly deferred or
  declined. MoSCoW is a planning lens applied at scoping and negotiation time;
  it is deliberately distinct from the `priority:Px` label taxonomy, which is a
  per-ticket backlog-state attribute.
steps:
  - title: Frame the scope being negotiated
    description: >
      Name the unit under negotiation — a mission, an epic bucket, or a release
      slice — and the constraint forcing the trade-off (time-box, dependency,
      reviewer capacity). MoSCoW is for bounding what a single committed unit
      carries, not for ranking the standing backlog.
  - title: Sort candidates into Must, Should, Could, Won't
    description: >
      Must — without it the unit fails its purpose; non-negotiable for this
      cut. Should — important and painful to omit, but the unit still delivers
      value without it. Could — desirable, low cost, included only if the Musts
      and Shoulds leave room. Won't — explicitly out of scope for this cut,
      recorded so it is not silently relitigated (it may return in a later cut).
    examples:
      - "Mission scoping: the acceptance gate is a Must; an extra diagnostic flag is a Could; a UI redesign is a Won't-this-cut, parked for a later mission."
      - "Release slice: a data-loss fix is a Must; a deprecation cleanup is a Should; cosmetic copy edits are a Could."
  - title: Commit the smallest viable Must set and defer the rest explicitly
    description: >
      Commit the Musts (plus any Shoulds the constraint affords) as the unit's
      scope, and record the Coulds and Won'ts as deferred rather than dropped.
      An explicit Won't is a decision with a rationale, not an omission — it
      prevents the same item being re-argued every planning cycle.
  - title: Translate, do not conflate, with the priority label taxonomy
    description: >
      Keep MoSCoW and `priority:Px` in their own registers. MoSCoW answers "is
      this in this cut?" at scoping time; `priority:Px` answers "how urgent is
      this ticket in the backlog?" at backlog-state time. A Must in one mission
      may be a `priority:P2` ticket in the backlog, and a `priority:P0` ticket
      may be a Won't for the current cut because it belongs to a different unit.
      Do not relabel one as the other or treat MoSCoW buckets as priority
      labels.
failure_modes:
  - "Conflating MoSCoW buckets with `priority:Px` labels, so scoping decisions overwrite backlog-state priority or vice versa."
  - "An oversized Must set that defeats the lens — if almost everything is a Must, the trade-off was never made."
  - "Dropping Coulds and Won'ts silently instead of recording them as deferred decisions, inviting the same items to be relitigated."
  - "Applying MoSCoW to rank the standing backlog rather than to bound a single committed unit."
applies_to_languages: []
notes: >
  MoSCoW is a scoping lens, not a priority scheme. In Spec Kitty the priority
  scheme is the canonical `priority:P0`..`priority:P3` label set (see the
  planning-and-tracking glossary subset); MoSCoW operates one level up, at the
  moment a mission or slice boundary is being negotiated. When each applies:
  MoSCoW at scoping and negotiation time; `priority:Px` at backlog-state time.
references:
  - name: Tracker Organisation Workflow
    type: procedure
    id: tracker-organisation-workflow
    when: Scoping which slices a functional epic or bucket commits to in a cut, alongside the per-ticket priority labels that workflow enforces.
