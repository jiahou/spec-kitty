schema_version: "1.0"
id: ownership-map-leeway
name: Ownership Map Leeway
purpose: >
  Give implementers rationale-backed leeway to edit files adjacent to their
  declared owned_files surface. The hard constraint is no-overlap between
  work packages — not a strict prohibition on any cross-boundary edit.
  Strict prohibition causes workarounds (such as TODOs, deferred fixes, or
  duplicated logic) that are worse than the bounded out-of-map edit they
  prevent.
steps:
  - title: Confirm no other WP owns the adjacent file
    description: >
      Before editing a file outside your owned_files list, check the task
      decomposition (wps.yaml or the tasks/ directory) to confirm no other
      work package declares ownership of that file. If another WP owns it,
      stop — coordinate or defer the edit to the owning WP.
    examples:
      - "Run: spec-kitty agent mission finalize-tasks --validate-only --mission <slug> --json to inspect the ownership map."
  - title: Record a one-line rationale
    description: >
      When making a small, justified out-of-map edit, record a one-line
      rationale — in the commit message or in the WP activity log — stating
      what was changed and why it could not wait for the owning WP. This
      makes the out-of-map edit auditable and reviewable.
    examples:
      - "Commit message: 'fix(WP05): correct import in shared helper (no WP owns this file; rationale: unblocks WP05 tests)'"
  - title: Confirm the no-overlap invariant holds after the edit
    description: >
      After the edit, verify the ownership map is still acyclic and
      non-overlapping. A non-overlapping map is the real guard against
      parallel-WP collisions — not a strict prohibition on any edit that
      touches a file outside the declared list.
    examples:
      - "Run: spec-kitty agent mission finalize-tasks --validate-only --mission <slug> --json"
failure_modes:
  - "Editing a file that another WP declares in its owned_files — this is the actual guard violation, not the out-of-map edit itself."
  - "Making an out-of-map edit without recording a rationale, leaving reviewers unable to distinguish intentional cross-boundary work from accidental scope creep."
  - "Treating strict same-files-only prohibition as the invariant and working around it with TODOs, deferred fixes, or duplicated logic instead of a bounded, justified edit."
references:
  - name: Planning and Tracking Styleguide
    type: styleguide
    id: planning-and-tracking
    when: >
      Use when setting up or reviewing task decomposition to understand the
      ownership-map constraints and leeway principles that govern WP isolation.
notes: >
  This tactic aligns with the "no-overlap is the real guard" language in the
  tasks-packages and tasks mission-step prompts:
  "Agents working on a WP should prefer to stay within their owned_files list;
  a small, well-justified out-of-map edit is acceptable when recorded with a
  one-line rationale (the no-overlap rule above is the real guard against
  parallel-WP collisions)."
  (src/doctrine/missions/mission-steps/software-dev/tasks-packages/prompt.md
  and src/doctrine/missions/mission-steps/software-dev/tasks/prompt.md)
  This tactic references that language as its authority — it does NOT
  restate or supersede the no-overlap rule with a different formulation.
