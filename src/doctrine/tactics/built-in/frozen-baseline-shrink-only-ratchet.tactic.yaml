schema_version: "1.0"
id: frozen-baseline-shrink-only-ratchet
name: Frozen-Baseline Shrink-Only Ratchet
purpose: >
  Track the current count of a gated allowlist (call sites, dead symbols,
  legacy entries, or any other countable technical-debt category) in a
  committed baseline file. CI fails if the live count grows beyond the
  committed baseline, and warns (but does not fail) if it shrinks. The baseline
  is updated only by deliberate human action with a recorded rationale. The
  allowed direction is shrink-or-stay; growth is a gate failure.
steps:
  - title: Capture the current count in a committed baseline file
    description: >
      Record the current allowlist size as a numeric entry in a shared baseline
      file (the canonical location is tests/architectural/_baselines.yaml for
      architectural gates). Use a per-test, per-category naming scheme so
      multiple gates can share one baseline file without collision. Add a
      justification comment on any non-zero initial value naming why the entries
      exist and citing a burn-down policy or follow-up tracker ticket where the
      count represents ongoing technical debt.
    examples:
      - |
        # tests/architectural/_baselines.yaml
        test_no_dead_modules:
          category_7_grandfathered_orphans: 6  # justification: 6 pre-existing orphans; target 0 by 4.0
  - title: Compare live count to baseline in CI and fail on growth
    description: >
      In the gate test, load the baseline file and compare the live allowlist
      size to the recorded value. Fail the test if live_count > baseline_count.
      Emit a warning (not a failure) if live_count < baseline_count so legitimate
      cleanup is not blocked. Include a remediation hint in the failure message
      naming the two valid resolutions: remove the new entry from the allowlist,
      or update the baseline in the same PR with a justification comment.
    examples:
      - |
        if live_count > baseline:
            fail(  # gate assertion (any test runner)
                f"Allowlist grew from {baseline} to {live_count}. "
                "Either remove the new entry or update _baselines.yaml "
                "in the same PR with a '# justification:' comment."
            )
        elif live_count < baseline:
            warnings.warn(
                f"Allowlist shrank from {baseline} to {live_count}; "
                "consider locking in the new lower bound in _baselines.yaml."
            )
  - title: Update the baseline only with explicit rationale
    description: >
      When a baseline value must grow (a new grandfathered exception is
      introduced), update the numeric value in the same PR as the allowlist
      change. Add a justification comment on the changed line naming why the
      growth is acceptable. For entries that represent ongoing technical debt,
      cite a follow-up tracker ticket. CI must never auto-update the baseline;
      the only valid update path is a human-authored, reviewed PR.
    examples:
      - "category_7_grandfathered_orphans: 7  # justification: +1 (6->7): new migration auto-discovered by pkgutil. Tracker: #NNN"
  - title: Enforce a burn-down policy for technical-debt categories
    description: >
      For entries that represent existing technical debt (grandfathered exceptions,
      backcompat shims, in-flight adapters), define a mandatory burn-down direction
      in the baseline comment: the category MUST shrink by a minimum number of
      entries per major release, with an explicit target of zero by a stated
      version. Record this policy in the baseline file comment and verify compliance
      at each release cut. Categories without a burn-down policy are permitted to
      accumulate indefinitely.
    examples:
      - "# Per C-004, this category MUST shrink by >= 2 entries per major release; target = 0 by 4.0."
failure_modes:
  - "Baseline auto-updated by CI: the baseline drifts with the code without human review, defeating the ratchet."
  - "Justification comment missing on growth: new grandfathered entries are added silently without rationale or tracker reference."
  - "No burn-down policy on technical-debt categories: entries accumulate indefinitely with no stated target or review cadence."
  - "Ratchet not run in CI: the comparison is only local; CI does not catch baseline violations."
  - "Baseline file not committed with the allowlist change: the PR adds an allowlist entry but updates the baseline in a follow-up, creating a window where CI is red."
notes: >
  Live exemplar: tests/architectural/_baselines.yaml (#2159) together with
  tests/architectural/test_ratchet_baselines.py. The baseline file records
  per-test, per-category allowlist sizes. The meta-test loads the baseline and
  compares live sizes, failing on growth and warning on shrinkage.

  WP02 is the sole owner of this tactic per C-003 of the doctrine-catfooding
  mission. WP09 (section 2 of the standing orders) and WP03 (section 5b)
  reference this tactic via their DRG edges but do not edit this file.
references:
  - name: Close Defect Classes by Construction
    type: directive
    id: DIRECTIVE_043
    when: Required governing directive for all structural enforcement mechanisms including ratchets.
