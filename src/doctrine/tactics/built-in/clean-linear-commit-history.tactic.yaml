schema_version: "1.0"
id: clean-linear-commit-history
name: Clean Linear Commit History via Snapshot Chain
purpose: >
  Compress a long-running integration branch that has accumulated many small
  administrative or bookkeeping commits into a short, clean, linear chain before
  it is shared in a pull request or rebased onto a moving base. The compression
  rebuilds history from existing tree states with git plumbing — never by
  replaying or reordering individual commits — so every snapshot is a real,
  once-tested tree and the result is byte-identical to the original branch tip.
  This yields a reviewable pull-request-sized history, conflict-once rebases,
  and slice-granular bisection without risking silently dropped intent.
steps:
  - title: Confirm preconditions and create a backup
    description: >
      Start from a clean working tree (no staged or unstaged changes). Create a
      backup branch at the current tip so the original history is recoverable if
      the rebuild goes wrong. Identify the fork point — the commit where the
      branch diverged from its base — because every rebuilt snapshot will be
      parented onto that commit.
    examples:
      - "git status --porcelain must be empty before starting."
      - "git branch backup/my-branch  # cheap, recoverable safety net"
      - "FORK=$(git merge-base origin/main HEAD)  # the fork point"
  - title: Choose semantic boundary commits in the existing history
    description: >
      Walk the existing commit log and pick a small number of existing commits
      to serve as boundaries — each boundary is the last commit of a meaningful
      phase. Bunch administrative and bookkeeping noise together behind one
      boundary; keep substantive code changes as their own snapshot(s), sliced
      along meaningful phases. Because the boundaries are existing commits, each
      one's tree is a real state the branch actually passed through and once
      tested — nothing new is fabricated.
    examples:
      - "Phase 1 (B1): planning and administrative churn → one snapshot."
      - "Phase 2 (B2): the implementation work → one snapshot."
      - "Phase 3 (B3): post-landing fixes → one snapshot."
      - "git log --oneline FORK..HEAD  # read the log, then mark B1, B2, B3"
  - title: Build the snapshot chain with plumbing, never by replay
    description: >
      Construct the new linear chain with git commit-tree, pointing each new
      commit at a boundary commit's tree and at the previous new commit as its
      parent. Each new commit's tree IS the boundary's tree, so there is nothing
      to merge and no conflict can arise by construction. This is fundamentally
      different from replaying commits: no per-commit patch is reapplied, so
      intent cannot be silently dropped during the rebuild.
    examples:
      - "S1=$(git commit-tree B1^{tree} -p $FORK -m 'phase 1: planning and admin')"
      - "S2=$(git commit-tree B2^{tree} -p $S1 -m 'phase 2: implementation')"
      - "S3=$(git commit-tree B3^{tree} -p $S2 -m 'phase 3: post-landing fixes')"
      - "git branch -f my-branch-clean $S3  # point a branch at the new tip"
  - title: Verify tree identity against the original tip
    description: >
      Prove the compressed branch is byte-identical to the original head by
      comparing the tree object of the old tip with the tree object of the new
      chain tip. They must be equal. If they differ, the boundary selection or
      chain construction was wrong — stop and re-examine before going further.
      Skipping this check is an anti-pattern: it is the only mechanical proof
      that no content was added, lost, or altered.
    examples:
      - "git rev-parse <old-head>^{tree}  # must equal the next line"
      - "git rev-parse $S3^{tree}  # the new chain tip's tree"
      - "[ \"$(git rev-parse <old-head>^{tree})\" = \"$(git rev-parse $S3^{tree})\" ] && echo IDENTICAL"
  - title: Rebase the short chain if the base has moved
    description: >
      If the branch also needs to catch up to a base that gained new work,
      rebase the SHORT clean chain onto the new base — never compress by
      committing a tree onto a base with newer work, because commit-tree would
      discard the base's changes. Build the chain on the branch's own lineage
      first, then move it with rebase. Conflicts now surface at most once per
      snapshot, with full-slice context, instead of once per noise commit.
    examples:
      - "git fetch origin"
      - "git rebase --onto origin/main $FORK my-branch-clean"
      - "Conflicts (if any) appear once per phase slice, not once per bookkeeping commit."
  - title: Run verification gates, then force-push with a lease
    description: >
      Run the project's full verification gates (tests, linters, type checks,
      terminology or policy guards) on the rebuilt branch before sharing it.
      Only after the gates pass, replace the remote branch with
      --force-with-lease so a concurrent push by someone else is detected
      rather than silently overwritten. Plain --force is an anti-pattern here.
    examples:
      - "Run the full test and lint suite on my-branch-clean."
      - "git push --force-with-lease origin my-branch-clean"
failure_modes:
  - "Interactive reorder/squash across long noisy history — using an interactive rebase to reorder or squash many small commits replays each commit as a patch; per-commit replay multiplies conflicts and can silently drop intent. Use the snapshot chain instead."
  - "Committing a foreign tree onto a base with newer work — building the chain on top of a moved base with commit-tree discards the base's changes, because the snapshot's tree fully replaces the base's tree. Build on the branch's own lineage, then rebase the short chain to move it."
  - "Skipping the tree-identity check — without comparing the old tip's tree to the new chain tip's tree, there is no proof the compression preserved content; drift can pass unnoticed."
  - "Reordering individual commits — the technique relies on existing, once-tested tree states; rearranging commits abandons that guarantee and reintroduces replay conflicts."
notes: >
  Why this works: a commit's tree is a complete content snapshot, independent of
  how the commit was reached. Re-parenting an existing tree with git commit-tree
  therefore produces a new commit with identical content and zero merge work.
  Choosing boundaries from real commits guarantees each snapshot is a state the
  branch genuinely passed through and once tested. The compression is purely a
  re-shaping of lineage; content is invariant, which the tree-identity check
  proves.

  Benefits to expect: a reviewable, pull-request-sized history; rebases that
  resolve conflicts at most once per slice instead of once per noise commit;
  every intermediate state a real tested tree; and bisection that lands on a
  meaningful slice boundary rather than a bookkeeping commit.

  Context note: this tactic is workflow-agnostic and applies to any git
  repository. In Spec Kitty it is the recommended post-merge step for a landed
  mission whose integration branch accumulated administrative commits — bunch
  the administrative churn into one snapshot and slice the code changes by
  phase, then rebase the short chain onto the upstream base.
