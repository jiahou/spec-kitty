schema_version: "1.0"
id: occurrence-classification-workflow
name: Occurrence Classification Workflow
purpose: >
  Guide mission authors through classifying string occurrences by semantic
  context before performing bulk edits.
steps:
  - title: Identify the target
    description: >
      Name the primary term being changed, its replacement, and the operation type.
    examples:
      - "target: constitution -> charter (rename)"

  - title: Enumerate occurrence categories
    description: >
      List every semantic context where the target appears. Start with standard
      categories: code symbols, import paths, filesystem paths, serialized keys,
      CLI commands, user-facing strings, tests/fixtures, logs/telemetry.
    examples:
      - "code_symbols, import_paths, filesystem_paths, serialized_keys, cli_commands, user_facing_strings, tests_fixtures, logs_telemetry"

  - title: Assign per-category actions
    description: >
      For each category, choose: rename, manual_review, do_not_change,
      or rename_if_user_visible.
    examples:
      - "code_symbols: rename; serialized_keys: do_not_change; cli_commands: manual_review"

  - title: Document exceptions
    description: >
      List specific files or patterns that override category-level rules.
    examples:
      - "exceptions: [{file: CHANGELOG.md, action: do_not_change, reason: historical record}]"

  - title: Write and validate the occurrence map
    description: >
      Write the classification to occurrence_map.yaml. Run validation before
      proceeding to implementation.
    examples:
      - "spec-kitty agent bulk-edit validate --mission my-mission"
