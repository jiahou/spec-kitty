schema_version: "1.0"
id: pr-agent-worktree-isolation
name: PR Agent Worktree Isolation and No-Version Prescription
purpose: >
  Govern two complementary constraints on how agents interact with PR branches:
  (1) agents that review or rebase a PR must execute in an isolated worktree,
  not in an active mission checkout; (2) scope documents must not assign patch
  or version numbers, because version decisions belong to the product owner at
  release time. Together these prevent cross-contamination of mission state and
  preserve the product owner's authority over the release boundary.
steps:
  - title: Isolate every PR-touching agent in a worktree
    description: >
      Any agent that reviews or rebases a PR — including review agents, rebase
      helpers, and automated analysis passes — must be invoked with
      `isolation: "worktree"` (the `Agent(isolation: "worktree")` parameter in
      the agent harness). A non-isolated agent operating on a PR diff executes
      in the caller's active checkout; git stages the PR diff into that checkout
      and cross-contaminates the active mission's working tree.

      Canonical failure class: a non-isolated review agent leaks a PR's changes
      into an unrelated mission's worktree. Documented instance: PR #2151 leaked
      into the respec of #2119 because the review agent ran in the active mission
      checkout rather than a dedicated worktree.
    examples:
      - "Correct: Agent(description='Review PR #2151', prompt='...', isolation='worktree')"
      - "Incorrect: Agent(description='Review PR #2151', prompt='...') — no isolation parameter, runs in the caller's checkout and stages the PR diff"
  - title: Avoid version-number prescriptions in scope documents
    description: >
      Scope documents, spec files, planning artifacts, and work package
      descriptions must not assign patch, minor, or major version numbers to
      planned work. Version numbers are superimposed at release time by the
      product owner. Prescribing a version in a scope document pre-empts that
      decision and couples planning artifacts to a release boundary they do not
      own.

      Frame work as a focus area, milestone, or follow-on item instead. If a
      prior art reference is needed, cite the mission slug rather than a version
      number.
    examples:
      - "Correct: 'Focus area: improve resolver performance' or 'Milestone: resolver-port completion'"
      - "Incorrect: 'Target v0.12.3' or 'Ship in v1.0' — version prescription that pre-empts the product owner's release decision"
  - title: Cross-reference history compression — do not restate it
    description: >
      The rule for compressing a mission's PR branch history after it lands is
      governed exclusively by `clean-linear-commit-history.tactic`. When
      advising on post-landing cleanup, refer to that tactic and follow its
      procedure. Do not re-author the history compression steps or restate its
      failure modes here; a second authority for the same rule creates
      split-brain doctrine.
references:
  - name: PR Agent Worktree Isolation Directive
    type: directive
    id: DIRECTIVE_045
    when: >
      This tactic operationalizes the §7 worktree-isolation and no-version
      rules that DIRECTIVE_045 makes binding. Consult the directive for the
      enforcement context and scope; consult this tactic for the procedural
      how-to. The `requires` edge from this tactic to DIRECTIVE_045 is a forward
      reference until WP06 lands; the DRG generator validates the edge at WP12
      graph regeneration time.
  - name: Clean Linear Commit History via Snapshot Chain
    type: tactic
    id: clean-linear-commit-history
    when: >
      Sibling discipline with a `refines`-type scope boundary: history compression
      after landing is governed by clean-linear-commit-history; worktree isolation
      and version-prescription restraint are governed here. Refer to that tactic
      for compress-history steps; refer to this tactic for PR-agent discipline.
failure_modes:
  - >
    Running a review or rebase agent without `isolation: "worktree"` — the agent
    executes in the caller's active mission checkout, and git stages the PR diff
    into that working tree. Staged files from the PR then appear in the mission's
    next commit, silently contaminating unrelated work.
  - >
    Assigning a version number in a spec or scope document — this pre-empts the
    product owner's release decision and couples planning artifacts to a release
    boundary outside their authority. Version numbers belong in release notes and
    changelogs, not in scope documents.
  - >
    Re-authoring history compression steps in this tactic — copying or paraphrasing
    `clean-linear-commit-history.tactic` content produces a second authority for the
    same rule. When the two diverge, agents face contradictory guidance. Always
    cross-reference the tactic; never restate its steps here.
notes: >
  The two rules share one tactic because they both constrain how agents behave
  around PR scope: worktree isolation prevents contamination of the active
  checkout; version restraint preserves the product owner's release authority.
  Neither rule has standalone value as a micro-tactic.

  Terminology: "PR branch" and "mission branch" are the canonical terms for
  branches associated with a pull request. Do not use "feature branch" in
  canonical voice.

  The `requires` edge to DIRECTIVE_045 and the `refines` edge to
  `clean-linear-commit-history` are inline DRG declarations; they will be
  materialised in `graph.yaml` at WP12's graph regeneration step. Until then,
  the DIRECTIVE_045 reference is a forward reference that dangles but does not
  invalidate this tactic's schema.
