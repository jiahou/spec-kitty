schema_version: "1.0"
id: DIRECTIVE_044
title: Canonical Sources and Unification
intent: >
  Agents and operators must use the canonical doctrine template, skill, or CLI command
  rather than improvising a substitute or copying from a prior mission artifact, because
  older artifacts drift from the canonical surface and copying them propagates the drift.
  When a concept is found to live in more than one location (a split-brain surface), the
  correct response is to consolidate to a single canonical authority — not to add the
  same behavior to every copy. A documented CLI command that is absent from the running
  tool is a gap to file upstream, not an invitation to hand-roll a workaround.
enforcement: required
scope: >
  Applies whenever an agent or operator selects a template, skill, or command to accomplish
  a task; whenever a split-brain surface is discovered during planning or implementation;
  and whenever a CLI command documented in canonical sources is found to be absent from the
  running tool.
procedures:
  - "Rule 1 — Use canonical sources: always use the canonical template, skill, or CLI
    command surface rather than copying from a prior mission in kitty-specs/ or constructing
    an ad-hoc substitute. Templates under src/doctrine/missions/<type>/templates/ are the
    single source of truth, resolved through the charter/doctrine chain. Prior missions are
    historical snapshots — they drift and must never be used as copy sources."
  - "Rule 2 — Unification not parity: when a split-brain surface is found — the same
    concept implemented or stored in more than one location — consolidate to one canonical
    surface authority. Do NOT add the same behavior to every copy (parity); parity preserves
    the split-brain. Exception: do not drop a load-bearing invariant without a migration
    path proven safe by tests."
  - "Rule 3 — Missing command is a gap: when a CLI command is documented in canonical
    sources but absent from the running tool, trace its source and file an upstream gap
    issue. Do not silently hand-roll a substitute. The gap record and escalation to the
    team are the correct outputs, not a workaround committed to the codebase."
integrity_rules:
  - "No agent may copy a spec, plan, or tasks artifact from kitty-specs/ and use it as a
    template for a new mission; the canonical templates are the only valid starting points."
  - "Consolidating to a single canonical surface is the only acceptable resolution for a
    split-brain surface; adding parity to non-canonical copies is a red-line violation."
  - "A missing CLI command that is documented must produce a gap report and upstream issue,
    not a hand-rolled workaround committed to the codebase."
validation_criteria:
  - "New missions reference templates resolved through the charter/doctrine chain, not
    copied from prior missions in kitty-specs/."
  - "When a split-brain surface is remediated, one canonical route is established and
    non-canonical copies are retired or redirected — never augmented in parallel."
  - "Any hand-rolled substitute for a documented but absent CLI command is flagged as a
    violation and replaced with either the correct CLI invocation or a filed gap."
references:
