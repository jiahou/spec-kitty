schema_version: "1.0"
id: DIRECTIVE_043
title: Close Defect Classes by Construction
intent: >
  A repeating defect class signals a missing structural constraint. The correct
  response is to eliminate the recurrence path with a structural mechanism —
  an AST call-site gate, a type invariant, or a shrink-only ratchet — rather
  than adding another process rule or discipline reminder. Structural enforcement
  closes the class permanently; process rules merely defer the next occurrence.
enforcement: required
scope: >
  Applies when a defect class has been identified as recurring or systemic: a
  convention every caller must remember, a boundary that is regularly crossed,
  or a pattern whose omission has caused defects more than once. Does not apply
  to one-off mistakes that have a clear root cause unrelated to a missing
  structural constraint.
procedures:
  - Identify the structural gap — what constraint, if enforced by the build system, would make the omission a CI failure rather than a code-review concern?
  - Author a gate (AST walk, type constraint, or frozen-baseline ratchet) that makes the violation a build failure. The gate must be non-vacuous — it must have a concrete floor and a self-mutation check so it cannot silently become a no-op.
  - Preserve existing compliant call sites in a shrink-only allowlist with one recorded rationale per entry. The allowlist must shrink as the codebase is cleaned up and must never grow without an explicit justification and a follow-up tracker ticket for any grandfathered exception.
  - Remove the process rule or discipline reminder once the gate enforces the constraint structurally — do not maintain both in parallel.
integrity_rules:
  - Adding a process rule or documentation reminder in response to a recurrent defect class, without a corresponding structural gate, is non-compliant with this directive.
  - A gate that trivially passes when the relevant call-site count is zero (vacuous gate) is non-compliant — the gate must have a concrete floor.
  - Growing a shrink-only allowlist without a justification comment and a tracker ticket reference is non-compliant.
  - Maintaining a process rule alongside a structural gate that already enforces the same constraint is non-compliant — the gate is the authority; the rule is redundant and creates drift.
validation_criteria:
  - For each identified recurrent defect class there exists a CI gate (AST, type, or ratchet) that makes the violation a build failure.
  - Every gate has a concrete floor preventing vacuous passage.
  - Every allowlist entry carries a justification comment; allowlists only shrink or stay across releases.
  - Structural gates are accompanied by a deletion or archival of the corresponding process rule once the gate is green.
references:
  - type: tactic
    id: architectural-gate-non-vacuity
  - type: tactic
    id: frozen-baseline-shrink-only-ratchet
  - type: styleguide
    id: adversarial-squad-cadence
  - type: tactic
    id: pr-agent-worktree-isolation
