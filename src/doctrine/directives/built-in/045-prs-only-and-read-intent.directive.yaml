schema_version: "1.0"
id: DIRECTIVE_045
title: PRs-Only and Read-Intent Before High-Risk Operations
intent: >
  All changes to the remote main branch go through pull requests — agents
  never push directly or merge without explicit operator instruction. Before
  executing any high-risk git operation (merge, rebase, deletion, force
  operations), agents must read the mission spec and current context first.
  Neither rule may be bypassed under time pressure or assumed from a task
  title alone.
enforcement: required
scope: >
  Applies to all agent-driven git operations that touch the remote main branch
  (origin/main) or that constitute high-risk operations: merges, rebases,
  deletions of branches or files, and force operations. Also applies during
  any review or implementation step that could result in one of these operations.
procedures:
  - All changes to origin/main must go through pull requests; never run
    `git push origin main` or `gh pr merge` without explicit operator
    instruction. The operator always merges to origin/main manually.
  - After `spec-kitty merge` (which merges to local main only and does NOT
    push to origin/main), create a PR branch (`git checkout -b pr/<slug>`)
    and open a pull request (`gh pr create`). Do not push to origin/main
    directly.
  - Recovery if origin/main is accidentally pushed to — do NOT force-push
    (branch protection blocks it). Create a `revert/<slug>` branch from
    origin/main, commit a revert, open a PR to merge it, then open the
    real mission PR.
  - Before executing any high-risk git operation (merge, rebase, deletion of
    branches or files, force operations), read the mission spec and the
    current context first. Never execute from a task title or a one-line
    description alone.
  - If the intent of a high-risk operation is unclear or the context is
    insufficient, escalate to the operator rather than proceeding. Correctness
    takes precedence over speed.
  - Never delete a test to make a build pass; such a deletion is a high-risk
    operation that requires explicit intent confirmation.
integrity_rules:
  - Agents must not run `git push origin main`, `git push --force`, or `gh pr
    merge` without explicit operator instruction.
  - "`spec-kitty merge` is permitted — it operates on local main only. The
    prohibition applies to pushing the result to origin/main without a PR."
  - Every high-risk git operation must be preceded by a documented intent
    check (reading mission spec/context). "The task title said to do it" is
    not sufficient justification.
  - PR branches and mission branches are the correct terms for non-main
    branches in canonical voice. The colloquial "feature branch" is a git
    idiom that must be quoted and marked when it appears in examples;
    it must not appear unquoted in canonical agent instructions.
validation_criteria:
  - Agent guidance for merge operations explicitly states that `spec-kitty
    merge` targets local main only and that a PR branch must be opened before
    the result reaches origin/main.
  - High-risk operation checklists require a mission-spec/context read step
    before execution.
  - No agent workflow example uses `git push origin main` or `gh pr merge`
    without explicit operator-authorization language.
  - Escalation path (to the operator) is documented for cases where intent
    is unclear.
references:
  - type: procedure
    id: mission-tracer-files
  - type: procedure
    id: post-merge-arch-gate-adjudication
