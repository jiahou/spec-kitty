schema_version: "1.0"
id: DIRECTIVE_025
title: Boy Scout Rule
intent: >
  Leave touched areas in a better state by default. When an area already modified
  for the current task carries a failing test, lint, or type issue, fixing it is the
  default stance — not an optional nicety. Establishing whether a failure is
  pre-existing routinely costs more effort than simply fixing it, and litigating
  blame leaves the campground dirtier; so the default is to fix, and to defer only
  with an explicit rationale.
  At planning point-cuts (post-spec, post-plan, post-tasks), this rule extends
  to proactive domain-matched debt folding: if a foldable tech-debt item belongs
  to the current mission's primary domain, it may be incorporated into the current
  scope; items outside the domain boundary are filed as issues and deferred, never
  silently absorbed. See also DIRECTIVE_024 for locality-of-change discipline;
  DIRECTIVE_040 for structural intervention on recurring bugs.
enforcement: lenient-adherence
scope: >
  Applies to the files and modules already modified for the current task, and to the
  failing tests, lint findings, and type errors surfaced within them. It does not
  license broad refactors or edits outside the touched area.
  Additionally applies at each planning point-cut: when reviewing scope at post-spec,
  post-plan, or post-tasks checkpoints, tech-debt items whose domain matches the
  current mission's primary domain are candidates for folding into scope; items whose
  domain does not match are filed as tracker issues and deferred.
procedures:
  - When a touched area has a failing test, lint finding, or type error, fix it by default rather than deferring it or attributing it to pre-existing state.
  - Apply minor cleanup that improves readability, naming, or consistency in touched areas.
  - Keep the fix proportional and local; defer a genuinely broad refactor (which belongs to a dedicated task) with a one-line rationale and, where useful, a tracker reference.
  - At each planning point-cut (post-spec, post-plan, post-tasks), identify foldable tech-debt items in the diff surface and triage them by domain match. Fold domain-matched items into the current mission scope; file and defer out-of-domain items as tracker issues rather than silently expanding or ignoring them.
  - Resolve critical or blocking tech-debt items before non-blocking or aesthetic items. Priority follows the item's impact on correctness or delivery velocity, not the ease of fixing it.
integrity_rules:
  - Adjacent-breakage fixes stay within the touched area and do not expand into broad refactors.
  - Behavioral changes beyond the failing-check fix require explicit tests.
  - Time spent proving a failure is pre-existing, rather than fixing it, is the waste this directive exists to prevent.
  - Domain-matched folding at a planning point-cut is gated by domain membership, not opportunistic convenience. An item is folded only if its domain demonstrably overlaps the current mission's primary domain; otherwise it is filed and deferred.
  - Out-of-domain debt items must never be silently absorbed into scope; they require an explicit tracker issue so they remain visible and actionable.
  - "Debt-paydown sequencing: critical or blocking items (those that impair correctness, break a gate, or block downstream work) take precedence over non-blocking aesthetic or cleanup items within the same point-cut."
validation_criteria:
  - No newly-visible failing test, lint finding, or type error in a touched area is left unaddressed without an explicit deferral rationale.
  - Cleanup remains proportional and does not delay or derail required deliverables.
  - After each planning point-cut, every foldable tech-debt item encountered has been either (a) folded into scope with a recorded rationale confirming domain match, or (b) filed as a tracker issue and explicitly deferred.
  - Within a point-cut triage pass, critical/blocking debt items are addressed or escalated before non-blocking items.
explicit_allowances:
  - Deferring an adjacent fix is allowed when it is genuinely large, risky, or out of scope — recorded with a one-line rationale and, where useful, a tracker reference.
  - When a touched-area failure is a pre-existing flake unrelated to the change, it may be deferred with a note rather than fixed inline.
  - At a planning point-cut, an out-of-domain debt item may be noted in the Activity Log and explicitly deferred without a formal tracker issue when the team determines the item is too small or ephemeral to warrant tracking overhead — but the deferral decision must still be recorded explicitly.
references:
  - type: directive
    id: DIRECTIVE_024
  - type: directive
    id: DIRECTIVE_040
  - type: tactic
    id: frozen-baseline-shrink-only-ratchet
  - type: paradigm
    id: brownfield-onboarding
opposed_by:
  - type: directive
    id: DIRECTIVE_024
    reason: >
      Locality of Change constrains the SCOPE of new work to the minimum the goal
      requires; it does NOT license leaving adjacent breakage in already-touched
      code. Campsite cleaning of touched-area failures is within locality; broad
      refactors are not. The two reconcile by fixing adjacent breakage by default
      while deferring genuinely broad refactors with a rationale.
