$schema: https://json-schema.org/draft/2020-12/schema
$id: https://spec-kitty.dev/schemas/doctrine/paradigm.schema.yaml
title: Paradigm
description: Minimal schema for doctrine paradigms.
type: object
additionalProperties: false
required:
- schema_version
- id
- name
- summary
definitions:
  contradiction:
    type: object
    additionalProperties: false
    required:
    - type
    - id
    - reason
    properties:
      type:
        type: string
        minLength: 1
        enum:
        - directive
        - tactic
        - paradigm
      id:
        type: string
        minLength: 1
      reason:
        type: string
        minLength: 1
  reference:
    type: object
    additionalProperties: false
    required:
    - type
    - id
    properties:
      type:
        type: string
        minLength: 1
        enum:
        - directive
        - tactic
        - styleguide
        - toolguide
        - paradigm
        - procedure
        - agent_profile
        - mission_step_contract
        - template
        description: Doctrine artifact type being referenced.
      id:
        type: string
        minLength: 1
properties:
  schema_version:
    type: string
    pattern: ^1\.0$
  id:
    type: string
    pattern: ^[a-z][a-z0-9-]*$
  name:
    type: string
    minLength: 1
  summary:
    type: string
    minLength: 1
  overrides:
    type: string
    pattern: ^[a-z][a-z0-9-]*$
    description: ID of a built-in paradigm this artifact replaces in full.
  enhances:
    type: string
    pattern: ^[a-z][a-z0-9-]*$
    description: ID of a built-in paradigm this artifact augments via field-merge.
  directive_refs:
    type: array
    items:
      type: string
      pattern: ^DIRECTIVE_\d{3}$
  references:
    type: array
    items:
      $ref: '#/definitions/reference'
  opposed_by:
    type: array
    items:
      $ref: '#/definitions/contradiction'
