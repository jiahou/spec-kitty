schema_version: "1.0"
id: refactoring
name: Refactoring
purpose: >
  Improve internal code structure without changing external behavior. This
  procedure provides a disciplined workflow for identifying improvement
  opportunities, selecting the right refactoring tactic, applying changes
  in safe increments, and verifying behavior preservation throughout.
entry_condition: >
  A code smell, structural weakness, or improvement opportunity has been
  identified. The code is under version control and has sufficient test
  coverage to verify behavior preservation.
exit_condition: >
  The refactoring is complete, all existing tests pass, the code is
  committed, and no external behavior has changed.
steps:
  - title: Identify the smell or improvement opportunity
    description: >
      Name the problem: duplicated logic, unclear naming, tangled
      conditionals, leaky abstractions, data clumps, feature envy,
      long parameter lists, or structural coupling. A clear diagnosis
      drives tactic selection. If the problem cannot be named, it is
      not yet understood well enough to refactor.
    actor: agent
    on_failure: Document the observation and defer until the problem can be articulated.
  - title: Select the relevant refactoring tactics
    description: >
      Based on the smell identified in step 1, choose one or more
      specific refactoring tactics. Apply the simplest tactic that
      addresses the problem. Resist combining multiple refactorings
      in a single pass — chain them sequentially instead.
    actor: agent
  - title: Apply in smallest viable steps
    description: >
      Execute the selected tactic one step at a time. After each
      mechanical change, run the relevant test suite. If tests fail,
      revert the last change and investigate. Never batch multiple
      structural changes between test runs.
    actor: agent
    on_failure: Revert the last change and re-examine the approach.
  - title: Verify behavior preservation
    description: >
      Run the full test suite. Compare observable behavior before and
      after. If any test fails, the refactoring introduced a behavior
      change — fix or revert. A passing suite is the only evidence
      that the refactoring is safe.
    actor: agent
    on_failure: Revert to last known-good state and retry with smaller steps.
  - title: Commit the refactoring separately
    description: >
      Commit the refactoring as a standalone change, separate from
      feature work or bug fixes. The commit message should name the
      smell that was addressed and the tactic applied. This keeps
      the refactoring reviewable and revertable.
    actor: agent
references:
  - type: tactic
    id: change-apply-smallest-viable-diff
  # Step 2 ("Select the relevant refactoring tactics") orchestrates selection
  # across the built-in Fowler refactoring catalog. Cite the catalog entries the
  # procedure can select so the catalog is reachable from the procedure that
  # governs it (DRG inbound wiring, not metric-gaming — these are real choices).
  - type: tactic
    id: refactoring-change-function-declaration
  - type: tactic
    id: refactoring-combine-functions-into-transform
  - type: tactic
    id: refactoring-consolidate-conditional-expression
  - type: tactic
    id: refactoring-extract-class-by-responsibility-split
  - type: tactic
    id: refactoring-inline-temp
  - type: tactic
    id: refactoring-introduce-null-object
  - type: tactic
    id: refactoring-replace-magic-number-with-symbolic-constant
  - type: tactic
    id: refactoring-replace-temp-with-query
  - type: tactic
    id: refactoring-retry-pattern
