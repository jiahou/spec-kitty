schema_version: "1.0"
id: mission-tracer-files
name: Mission Tracer Files
purpose: >
  Give every mission a lightweight running log of tooling friction, approach
  evolution, and design rationale through three sparse tracer files. The files
  are seeded at mission start, appended to during implementation, and assessed
  at mission close. Captured friction and rationale feed the next mission's
  planning and make recurring tool and process gaps visible instead of
  repeatedly re-discovered.
entry_condition: >
  A mission has started (at planning or at the first implement command). The
  mission's kitty-specs directory is initialised and a traces/ subdirectory
  can be created under it.
exit_condition: >
  All three tracer files have been reviewed at mission close, insights have
  been summarised in the mission retrospective, and any surfaced
  tooling-friction issues have been filed in the tracker. The files are
  committed to the mission branch as a permanent record.
steps:
  - title: Seed — create the three tracer files at mission start
    description: >
      Create the directory traces/ under the mission's kitty-specs/ directory.
      Copy the three doctrine templates (tooling-friction.md, approach.md,
      design-decisions.md from src/doctrine/templates/mission-tracer-files/)
      into it. Fill in the initial context for each file: what tooling the
      mission touches, what approach is being tried (as stated in the spec or
      plan), and what design decisions have already been made in the spec or
      plan. The initial entries should take under five minutes per file.
    actor: agent
  - title: Append — add dated entries during implementation
    description: >
      At each significant decision point, when an unexpected blocker is
      encountered, or when tooling friction slows progress, append a brief
      dated entry (1-3 sentences) to the relevant tracer file. Tooling
      friction goes in tooling-friction.md; approach changes go in
      approach.md; design choices and their rationale go in
      design-decisions.md. Entries should be written at the moment they occur,
      not reconstructed at the end.
    actor: agent
  - title: Assess — review and act at mission close
    description: >
      Before marking the mission as done (or as part of the accept step),
      review all three tracer files. Summarise the most significant insights
      in the mission retrospective. File any unresolved tooling-friction items
      in the tracker so they feed the tooling-gap backlog. Confirm the tracer
      files are committed to the mission branch before closing.
    actor: agent
anti_patterns:
  - name: Retroactive fill-in
    description: >
      Writing all tracer entries at mission close from memory rather than
      appending at the moment friction or a decision occurs. Retroactive
      entries miss detail and timing; the tracer files' value comes from
      in-the-moment capture.
  - name: Over-length entries
    description: >
      Writing paragraphs per entry instead of 1-3 focused sentences. The
      files are a running log, not a document. Verbosity degrades the
      signal-to-noise ratio and makes the assess step harder.
  - name: Skipping the assess step
    description: >
      Treating the tracer files as write-only and never reviewing them at
      mission close. The assess step is what converts the raw log into
      actionable tracker items and retrospective inputs.
notes: |
  These tracer files are optional experiment infrastructure — their absence
  does not block acceptance. They support the adversarial-squad cadence
  and post-planning review, but skipping them is not a mission-gate violation.

  Provenance: folds experiment #2095 — multi-tracer pre-flight cadence.
  Close issue #2095 on land with a reference to mission
  doctrine-catfooding-2196-01KWE16N.

  Lifecycle summary: seed (at mission start) -> append (during implementation)
  -> assess (at mission close). Three files, three phases.
references:
  - type: styleguide
    id: adversarial-squad-cadence
    reason: >
      The tracer files (especially tooling-friction and approach entries) are
      inputs to the post-tasks anti-laziness squad and the post-merge
      retrospective described by the adversarial-squad cadence. Forward
      reference: adversarial-squad-cadence styleguide is authored by WP08 of
      mission doctrine-catfooding-2196-01KWE16N.
  - type: paradigm
    id: brownfield-onboarding
    reason: >
      Tracer files are naturally seeded during the brownfield ramp-up phase
      to capture early tooling friction and initial approach decisions before
      implementation begins.
