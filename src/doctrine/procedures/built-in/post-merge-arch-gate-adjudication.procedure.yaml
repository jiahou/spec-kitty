schema_version: "1.0"
id: post-merge-arch-gate-adjudication
name: Post-Merge Arch-Gate Adjudication
purpose: >
  After merging one or more lane branches, architectural gate failures may appear
  that were not visible during per-lane review. This procedure distinguishes
  pre-existing failures (present on the mission base branch before any lane work)
  from regressions introduced by the merge. Correct adjudication prevents teams
  from either ignoring real regressions or blocking on failures they did not cause.
entry_condition: >
  One or more architectural gate tests are failing on the merged coordination or
  target branch after lane branches have been merged. The failure was not surfaced
  as a blocker during per-lane review (it may have been absent, masked by the
  lane base, or only triggered by the combined diff).
exit_condition: >
  Every failing architectural gate test has been classified as either pre-existing
  or a regression. Pre-existing failures have a filed tracking issue and a recorded
  baseline entry. Regression failures have been corrected before further merging
  proceeds. The classification rationale is recorded in the work package or PR
  activity log.
steps:
  - title: Run the full architectural gate suite on the merged branch
    actor: agent
    description: >
      Run the complete `tests/architectural/` suite on the merged coordination or
      target branch — not just the shard that surfaced in CI. A single-shard run
      can miss related gate failures that share the same root cause. Record every
      failing test by name and shard.

      ```bash
      PWHEADLESS=1 pytest tests/architectural/ -q 2>&1 | tee /tmp/arch-gate-run.txt
      ```

      Do not investigate root cause yet — collect the full failure inventory first.
    on_failure: >
      If the test run itself cannot complete (environment error, import failure),
      fix the environment before proceeding. Do not classify failures inferred from
      partial output.

  - title: Establish the pre-existing baseline via cross-base diff
    actor: agent
    description: >
      "Pre-existing" means the failure is already present on the **mission base
      branch** — the branch from which all lane worktrees were created (the
      `target_branch` field in `meta.json`). This is not the same as the lane base,
      which may be an intermediate commit further ahead in history.

      For each failing test, determine whether it also fails on the mission base
      branch:

      ```bash
      # Identify the mission base branch (from meta.json or lanes.json)
      MISSION_BASE=$(spec-kitty agent mission info --json | jq -r '.target_branch')

      # Run only the failing tests against the mission base branch
      git stash  # or use a worktree for clean isolation
      git checkout "$MISSION_BASE"
      PWHEADLESS=1 pytest <failing-test-paths> -q 2>&1 | tee /tmp/arch-gate-baseline.txt
      git checkout -  # return to merged branch
      ```

      A test that fails on the mission base branch is **pre-existing** — it was
      there before any lane work began. A test that passes on the mission base
      branch but fails on the merged branch is a **regression**.

      Record the result for every failing test: pre-existing or regression.
    on_failure: >
      If the mission base branch cannot be checked out cleanly, use a separate
      worktree: `git worktree add /tmp/base-check "$MISSION_BASE"` and run the
      failing tests there.

  - title: Run CI-only shards locally before concluding
    actor: agent
    description: >
      Some architectural and integration test shards run only in CI (for example,
      the `integration-tests-core-misc` job) and are absent from the local
      `fast-tests-*` suites. A failure that appears only in CI may belong to one
      of these shards, not to the `tests/architectural/` suite you ran locally.

      Before concluding that a CI failure is a flake or an unexplained anomaly,
      run the following locally:

      ```bash
      # Integration tests (CI-only shard equivalent)
      PWHEADLESS=1 pytest tests/integration/ -q

      # Git / worktree integration tests
      PWHEADLESS=1 pytest tests/git/ -q

      # Architectural guard suite (already run in Step 1; re-run if needed)
      PWHEADLESS=1 pytest tests/architectural/ -q
      ```

      A failure that only appears in CI and cannot be reproduced against any of
      these local shards is a candidate flake — file it separately and do not
      block the merge on it. A failure that reproduces locally is a genuine
      regression or a pre-existing issue; proceed to adjudication.
    on_failure: >
      If a local shard cannot run (missing dependency, environment gap), document
      why and escalate rather than assuming the CI failure is a flake.

  - title: Adjudicate and record
    actor: agent
    description: >
      Apply the classification from Steps 2 and 3 to each failing gate:

      **Pre-existing failure:**
      1. File a tracking issue describing the failing gate, the evidence that it
         pre-exists the current merge (output from Step 2), and the shard it belongs
         to.
      2. Record the failure as a known baseline in the activity log or PR description:
         "Gate X was already failing on the mission base branch; tracked as #NNNN."
      3. Do not block the current merge on a pre-existing failure. The tracking
         issue is the remediation commitment.

      **Regression:**
      1. Fix the regression before merging further. A regression introduced by this
         merge must be corrected in the same merge cycle.
      2. Re-run the full `tests/architectural/` suite after the fix to confirm
         it passes.
      3. Record the fix in the commit message and activity log.

      In both cases, write the classification rationale into the PR description or
      work-package activity log so reviewers can verify the adjudication without
      re-running the steps.
    on_failure: >
      If classification is ambiguous (the test is flaky on the mission base branch
      or the mission base cannot be reached), escalate to the human with the
      specific evidence collected in Steps 1–3. Do not resolve ambiguity by
      defaulting to "pre-existing."
anti_patterns:
  - name: Single-shard inspection
    description: >
      Running only the failing CI shard and declaring the investigation complete.
      Sibling gate failures with the same root cause are missed, and the full
      failure inventory is wrong.
  - name: Comparing against the lane base instead of the mission base
    description: >
      In coord topology, lane bases are intermediate commits that may already
      include other lanes' changes. Comparing a failing test against the lane base
      (rather than the true mission base branch) gives an incorrect pre-existing
      verdict when the failure was in fact introduced by an earlier lane.
  - name: Concluding flake without running CI-only shards locally
    description: >
      Dismissing a CI-only failure as a flake without first running
      `tests/integration/`, `tests/git/`, and `tests/architectural/` locally.
      CI-only shards reveal real failures that never appear in fast-tests runs.
  - name: Blocking a merge on a confirmed pre-existing failure
    description: >
      Treating a gate failure that existed on the mission base branch as a
      regression blocker. Pre-existing failures should be tracked and scheduled
      for remediation, not used to block merges that did not introduce them.
  - name: Skipping the activity log record
    description: >
      Adjudicating a failure verbally or in chat without recording the
      classification and evidence in the PR or activity log. Future reviewers
      must be able to reconstruct the adjudication from written artifacts.
notes: >
  The key distinction this procedure enforces is "mission base branch" vs.
  "lane base branch." In coord-topology missions, lane worktrees branch from
  an intermediate branch (the mission branch, e.g.
  `kitty/mission-<slug>-<mid8>-lane-<id>`), not from `main` or the final
  coordination target. The `target_branch` in `meta.json` is the mission base;
  the lane's own `base` field in `lanes.json` is the lane base. These may
  differ. Always use `meta.json`'s `target_branch` as the pre-existing baseline.

  Adapted from the post-merge arch-gate adjudication standing order in
  docs/development/quality-and-tech-debt-standing-orders.md §5b.
references:
  - type: directive
    id: DIRECTIVE_043
    reason: >
      This procedure operationalises the close-by-construction requirement from
      DIRECTIVE_043: gate failures that are pre-existing must be tracked and
      structurally resolved, not ignored; regression failures must be fixed
      before further merging proceeds.
  - type: tactic
    id: architectural-gate-non-vacuity
    reason: >
      The architectural gate non-vacuity tactic describes how to author gates
      that cannot silently pass; this procedure describes what to do when those
      gates fire after a merge and the root cause (pre-existing vs. regression)
      must be determined.
