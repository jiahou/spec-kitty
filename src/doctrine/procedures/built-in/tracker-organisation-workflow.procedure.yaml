schema_version: "1.0"
id: tracker-organisation-workflow
name: Tracker Organisation Workflow
purpose: >
  Restore traceability to an issue tracker that has drifted after a
  high-velocity development phase. Every open ticket ends up under a coherent
  functional epic with an issue type and a single priority, meta-trackers are
  isolated as reference-only, closed epics strand no work, and duplicates are
  resolved with community-precedence. The workflow is tracker-neutral: GitHub
  native sub-issues are one carrier, but the invariant is a tiered functional
  ownership graph (root to coherent buckets to leaves) with auditable changes.
entry_condition: >
  An issue backlog has lost traceability — open tickets are orphaned, parented
  under closed or superseded epics, scattered across catch-all roots, or owned
  by release/go-no-go rollups acting as functional parents — and needs to be
  made workable again before the next planning cycle.
exit_condition: >
  Every open ticket resolves to a functional epic (not orphan, not meta-rooted,
  not under a closed epic), carries an issue type and a single priority label,
  meta-trackers are prefixed and reference-only, duplicates are resolved, and a
  re-walk of the backlog returns a clean bill with an auditable trace of every
  change.
steps:
  - title: Inventory open tickets and walk each to its root
    actor: agent
    description: >
      Enumerate open tickets by type and priority, then walk each parent chain
      to its root epic. Parent links are the source of truth, not body
      checklists; where the tracker exposes parentage only via a richer query
      surface, use it (for GitHub the `parent` field is reliable via GraphQL,
      not REST). Batch parent lookups for a whole ring in a single aliased query
      to scope the orphan set cheaply rather than per-ticket calls that trip
      secondary rate limits.
  - title: Classify roots as functional, meta-tracker, orphan, or closed
    actor: agent
    description: >
      Sort each root epic into one of four classes. A functional epic represents
      a real domain of work — a subsystem, capability, or bug-class — and owns
      its tickets. A meta-tracker is a release gate, go/no-go, or program rollup
      that references work but must not own functional tickets. An orphan has no
      owning epic. A closed root is superseded or split. Classification drives
      every later step.
  - title: Drain closed epics, collapse passthrough tiers, relabel meta-trackers
    actor: agent
    description: >
      Re-home every open child stranded under a closed or superseded parent — a
      ticket under a closed epic looks tracked but is invisible. Collapse any
      epic that has become a one-child passthrough (close it as superseded and
      promote the child) — a redundant tier adds no information. Prefix
      meta-trackers `META-TRACKER:` and strip them of canonical functional
      children; route release gating to milestones or labels instead.
  - title: Re-slice catch-all roots into coherent buckets
    actor: agent
    description: >
      A root that holds a flat pile of mixed-granularity tickets — sub-epics,
      loose bugs, and ancient unrelated items together — has drifted into a
      catch-all. Re-slice it into buckets (sub-epics for distinct sub-classes)
      so the tree reads root to coherent buckets to leaves rather than a single
      undifferentiated tier.
  - title: Sweep each epic by keyword and scope-read; flag overlaps
    actor: agent
    description: >
      For tickets not yet handled, read the body — do not keyword-match blindly.
      Backfill native parent/child links where only an invisible body checklist
      existed. When one concern spans several epics, flag the overlap and name a
      single owner to decide, rather than silently picking a parent.
  - title: Detect orphan clusters and reuse-or-create functional epics
    actor: agent
    description: >
      When roughly four or more orphans share a concern with no owning epic,
      first search for an existing canonical epic whose charter already covers
      the domain and nest the slice under it. Only create a new epic when none
      fits. Name the epic for the user value it delivers, not internal jargon;
      its body states Purpose, Scope, and Out-of-scope, and does not list child
      ticket numbers — the sub-issue graph is the source of truth.
  - title: Resolve duplicates with community-precedence
    actor: agent
    description: >
      When two non-umbrella tickets duplicate, keep the community-authored one
      and close the core-team duplicate — but only after migrating the closed
      ticket's evidence into the survivor. Verify a supposedly stale community
      ticket is truly dead, and comment inviting confirmation, before closing.
      Never greet a contributor with a bare "duplicate, closed".
  - title: Enforce hygiene invariants on every open ticket
    actor: agent
    description: >
      Confirm each open ticket resolves to a functional epic, carries an issue
      type (Task, Bug, or Feature; epics are typed Feature), and carries exactly
      one priority label. Derive type objectively from the conventional-commit
      prefix and existing labels. Priority is triage judgement — assign
      `priority:P2` + `triage:needs-revision` as the canonical provisional default
      and flag it rather than silently guessing — and audit for conflicting
      multi-value priority after any migration.

      Canonical-tree carve-out: some roots or buckets may be under change-control
      (e.g. a governed canonical-tree node whose type or parent relationship must
      not change without a tree-owner decision). For such nodes, additive
      label-only mutations (adding a canonical `priority:Px` or `triage:*` label)
      are permitted. Type changes, reparenting, and closure require a recorded
      proposal to the tree owner rather than execution. Record the prescribed fix
      as a named proposal with an owner reference.
  - title: Verify with a clean-bill re-walk and keep an auditable trace
    actor: agent
    description: >
      Re-walk the whole backlog: no genuine orphans, nothing meta-rooted,
      nothing under a closed parent, every ticket typed and singly-prioritised.
      Remaining unparented items should be only epic and meta-tracker roots plus
      any deliberately-parked blob with a named owner. Keep an auditable record
      of every move so a reviewer can reconstruct the decisions.
anti_patterns:
  - name: Meta-tracker as functional parent
    description: "Making a release or go/no-go rollup the canonical parent of work tickets; release gating belongs in milestones or labels, not issues-as-parents."
  - name: Work stranded under a closed epic
    description: "Open tickets parented under a closed or split epic look tracked but are invisible to planning."
  - name: Catch-all root
    description: "A single root holding mixed-granularity tickets instead of coherent buckets, defeating tiered ownership."
  - name: Forking a near-duplicate epic
    description: "Spawning a sibling epic when an existing canonical epic already covers the domain; nest a slice under it instead."
  - name: Bare duplicate closure
    description: "Closing a community contributor's ticket as duplicate without migrating its evidence or inviting confirmation."
  - name: Child ticket list in the epic body
    description: "Listing child ticket numbers in the epic body, which drifts out of sync; the native sub-issue graph is the source of truth."
  - name: Keyword-only triage
    description: "Assigning parents by title or keyword match without reading the body and missing cross-epic overlaps."
applies_to_languages: []
notes: >
  Distilled from a full-backlog tracker remediation (235 open tickets reviewed,
  zero genuine orphans remaining). Pair this workflow with the
  iterative-deepening-review tactic to sequence the sweep in widening time
  windows, and with moscow-scoping-lens when negotiating which slices a bucket
  must, should, could, or won't carry. The supporting planning-and-tracking
  vocabulary (functional epic, meta-tracker, issue type, priority scheme, triage
  status) is defined in the planning-and-tracking glossary subset. DRG wiring of
  the references below is performed by the consolidation mission's graph step.

  Label-only mutations (adding a `priority:Px` or `triage:*` label) on a
  canonical-tree node are permitted — they are additive. Type changes,
  reparenting, and closure of governed nodes require a proposal recorded for the
  tree owner. When a node is off-limits to type/parent mutations, record the
  prescribed fix as a named deferred proposal rather than executing it (see Step 8
  carve-out). This preserves the audit trail while respecting tree governance.
references:
  - type: tactic
    id: iterative-deepening-review
    reason: Sequences the backlog sweep in widening time windows so emergent groupings become epics before later rings reach them.
  - type: tactic
    id: moscow-scoping-lens
    reason: Provides the scoping lens for negotiating what each bucket or slice must, should, could, or won't carry, distinct from the priority label taxonomy.
  - type: procedure
    id: issue-triage-state-machine
    reason: Per-ticket triage — one category and one state with durable handoff or rejection context — feeding this tracker-wide organisation pass.
  - type: styleguide
    id: planning-and-tracking
    reason: Defines the epic/meta-tracker hierarchy, issue-type, priority, and triage conventions this workflow enforces while organising the tracker.
  - type: toolguide
    id: github-tracker
    reason: Supplies the gh CLI + GraphQL mechanics (sub-issues, types, parent walks) used to read and re-home tickets during the organisation pass.
