# WP12 frontmatter-backfill section-completion ledger (FR-010 / NFR-003 / NFR-004).
#
# Authoritative surface owned by WP12. Tracks the per-section progress of the
# ~580-page (live tree: 415 docs/*.md) frontmatter backfill so a context reset
# resumes from the first un-done section, not from zero.
#
# "done" for a section means: every page in it has title + description (50-180,
# content-derived, no placeholder) + doc_status + updated, and contributes 0
# dangling related edges. Mechanical fields (title/doc_status/updated/related)
# were landed tree-wide in the T071 pass; per-section work is the hand-authored
# `description`.
#
# ---------------------------------------------------------------------------
# STALE-INVENTORY GAP (flagged to orchestrator):
#   WP11's frontmatter_backfill.py is keyed off docs/development/3-2-page-inventory.yaml,
#   the PRE-move snapshot. After WP03/WP04/WP16 only 228/580 inventory rows still
#   resolve, and 360/415 live docs/*.md pages have NO inventory row. The tool can
#   therefore reach only ~55 of the live docs pages. Frontmatter is the SSOT now
#   (the tool's own docstring: inventory becomes a generated rollup derived FROM
#   frontmatter, regenerated by WP13). So this WP authors frontmatter DIRECTLY on
#   the live tree (the doc_status/updated/related discriminators below replace the
#   tool's inventory-derived values), and WP13's inventory_lockfile.py regenerates
#   the inventory FROM this authored frontmatter.
# ---------------------------------------------------------------------------
#
# doc_status discriminator (section/path-based; replaces the tool's degenerate
# `internal`->draft uniform mapping, whose current_target signal never fires
# `active`):
#   * Explicit author signal wins: an existing `doc_status` or a bare `status:`
#     with a valid value (draft/active/deprecated/superseded) is honored, and a
#     bare `status:` is converted to `doc_status` (bare status is ADR-only).
#   * Section fallback when no explicit signal:
#       - plans/                       -> draft       (ephemeral; distil-then-retire)
#       - archive/, 01KSMG8Y-closeout/ -> deprecated  (retired/closed-out in place)
#       - everything else              -> active      (durable: api, guides,
#                                                       configuration, operations,
#                                                       architecture, context,
#                                                       doctrine, migration, ...)
#
# updated date source (a git mv resets %cs to the move commit, which is NOT
# content freshness):
#   * existing frontmatter `updated`/`date` -> kept verbatim
#   * else `git log --follow --diff-filter=AM --format=%cs` latest (last real
#     content commit, skips pure-rename move commits)
#   * else today (untracked/new pages only)

mechanical_pass:  # T071 — title/doc_status/updated/related landed tree-wide
  status: done
  pages_changed: 415
  related_dangling: 0

# OVERALL: all 13 live docs/ sections (19 top-level dirs) description-complete.
# description_length_check --strict: 0 violations / 415 checked.
# related_validator --strict: 0 dangling / 562 edges checked.
# doc_status distribution: active 244, draft 155 (plans), deprecated 16 (archive+closeout).
overall_status: complete

# NOTE — fields intentionally NOT backfilled (out of WP12's gated DoD; for WP13):
#   version_tag / type (divio) / owning_workstream were NOT carried onto pages.
#   The only source is the stale pre-move inventory (covers 55/415 docs pages),
#   and these fields are not gated by WP12 (title/description/doc_status/updated
#   + 0-dangling related are). WP13's inventory_lockfile.py is the proper place
#   to derive/roll them up FROM the now-authoritative frontmatter (e.g. divio
#   from section, owning_workstream from path).
#
# NOTE — the canonical frontmatter_backfill.py --write was deliberately NOT run
#   blind: its doc_status comes from the stale inventory's degenerate
#   internal->draft mapping and would clobber the section-based discriminator on
#   the ~55 reachable pages (the exact override WP11-review asked WP12 to apply).
#   The mechanical pass IS T071's intent, with the corrected discriminator.

sections:
