name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [ main, 2.x ]
    paths:
      - 'docs/**'
      - 'kitty-specs/**'
      - '.kittify/glossaries/**'
      - 'scripts/docs/generate_kitty_specs_docs.py'
      - 'scripts/docs/seo_postprocess.py'
      - 'scripts/docs/redirect_stub_generator.py'
      - 'scripts/docs/redirect_map.yaml'
      - 'scripts/docs/redirect_baseline_urls.json'
      - 'src/specify_cli/dashboard/templates/glossary.html'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for git info

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build documentation
        run: |
          python3 scripts/docs/generate_kitty_specs_docs.py
          cd docs
          docfx docfx.json
          cd ..
          python3 scripts/docs/seo_postprocess.py

      # DocFX/GitHub Pages has no native redirect (FR-006). Inject a
      # <meta http-equiv="refresh"> stub at every moved old URL into the built
      # _site BEFORE upload, so no bookmarked URL 404s post-fold. The redirect
      # map is single-writer (WP07-owned), derived from occurrence_map.yaml
      # `moves:`. Runs after `Build documentation` (which emits docs/_site) and
      # before `Upload artifact`. Fails the job if any stub would point at a 404.
      - name: Inject redirect stubs into _site (FR-006)
        run: python3 scripts/docs/redirect_stub_generator.py generate --site-dir docs/_site

      # NFR-002 gate: assert every URL in WP02's committed pre-move baseline
      # resolves directly or via a live-target stub (uncovered == []). The check
      # is non-vacuous — it refuses to pass against an empty baseline.
      - name: Verify redirect coverage (NFR-002)
        run: python3 scripts/docs/redirect_stub_generator.py coverage --site-dir docs/_site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
