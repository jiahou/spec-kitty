hindered:
- id: hn-001
  category: tooling
  summary: Mid-mission rebase of the planning/design branch onto a moved upstream base desynced the coord
    branch + all lane worktrees (they stayed on the pre-rebase base). spec-kitty has no first-class 'rebase
    mission onto moved base' operation; recovery required a manual coord-branch rebuild (reset to design
    base + overlay the preserved status ledger) plus per-lane re-stacking of verified code diffs.
  evidence_refs: []
- id: hn-002
  category: tooling
  summary: 'Merge-forwarding upstream/main into lane worktrees to freshen them dragged in OTHER active
    missions'' kitty-specs/ planning dirs (they live on the shared trunk), tripping the lane-hygiene guard.
    Lesson: do not merge the shared trunk into a lane; grab only the specific files needed, or rebase
    the mission branch wholesale.'
  evidence_refs: []
- id: hn-003
  category: tooling
  summary: 'Lane-hygiene guard false-positives after a planning-branch rebase: it flags kitty-specs files
    by COMMIT-HISTORY, not content. Files byte-identical to the planning branch (diff=0) still blocked
    move-task because the rebase left the lane sharing only an ancient merge-base. Required documented
    --force overrides.'
  evidence_refs: []
- id: hn-004
  category: tooling
  summary: 'Review-artifact consistency split: the per-WP approve-over-rejected guard checks the LANE
    worktree (no review-cycle artifact there -> approval passes), but the merge gate checks the COORD
    worktree (rejected cycle-1 artifact -> merge blocked). A cycle-1 re-review approval recorded the status
    event but persisted no approved review-cycle artifact, so merge failed REJECTED_REVIEW_ARTIFACT_CONFLICT
    until the approved artifact was written by hand.'
  evidence_refs: []
- id: hn-005
  category: process
  summary: WP01's D-1 escape guard was over-scoped (flagged links escaping docs/ instead of the repo-root
    invariant the retired checkers enforced). It passed WP01 review AND the post-tasks squad; only surfaced
    at WP02 integration when EXCLUDE_PREFIXES flipped and the CI gate went red on 103 in-repo refs. Integration-point
    semantics deserve explicit review when one WP's behavior only manifests after a later WP's change.
  evidence_refs: []
