      - src/specify_cli/upgrade/migrations/m_0_14_0_centralized_feature_detection.py
        (historical migration).
      - Generated agent dirs (.claude/, .codex/, …) — regenerated, never hand-edited.

categories:

  code_symbols:
    description: >
      The `feature` / `explicit_feature` parameters and the alias arguments to
      resolve_selector in the in-scope command modules.
    action: manual_review
    notes: |
      CRITICAL (adversarial review): `resolve_selector(*, alias_value, alias_flag, ...)`
      has NO defaults for `alias_value`/`alias_flag` (selector_resolution.py:123) —
      you CANNOT just drop the args (TypeError) and you MUST NOT leave
      `alias_flag="--feature"` (forbidden token + keeps the alias alive). The
      recipe is NOT uniform across files:
        - tasks.py / status.py: route through a SHARED `_find_mission_slug` helper
          holding the single resolve_selector call; status.py threads
          `explicit_feature` through a SECOND helper `_resolve_status_surface`.
          Remove the per-command `feature` params + every `explicit_feature=...`
          arg + the `alias_value`/`alias_flag` args in the helper's single call.
        - workflow.py: one resolve_selector call (keep the unrelated
          merge_append_preserving_coordination_event_log_bytes import).
        - materialize.py / verify.py / validate_encoding.py / validate_tasks.py:
          ONE resolve_selector call each — remove the call and use `mission`
          directly (`mission_slug = mission`); do NOT blindly swap to
          resolve_mission_handle (it returns ResolvedMission + exits(2)).
        - charter/lint.py: NO resolver — plain ternary `scope = mission if
          mission is not None else feature` (L108) → `scope = mission`.
        - agent/context.py: uses `resolve_mission_handle(mission or feature)` (L123/126)
          → drop `or feature`.
        - agent/mission.py: NO `--feature` option (see cs-005) — help-string only.
      Never touch the resolve_selector definition (FR-008).
    occurrences:
      - id: cs-001
        file: src/specify_cli/cli/commands/agent/tasks.py
        notes: "12 hits: feature params + explicit_feature plumbing + resolve_selector alias args (e.g. L717,734,749,1687,2804,3063,3149,3226,3475,3794,3887,4375)."
      - id: cs-002
        file: src/specify_cli/cli/commands/agent/status.py
        notes: "9 hits: feature params + resolve_selector alias args."
      - id: cs-003
        file: src/specify_cli/cli/commands/agent/workflow.py
        notes: "4 hits (alias). NOTE: the merge_append_preserving_coordination_event_log_bytes import from status_service is UNRELATED and stays."
      - id: cs-004
        file: src/specify_cli/cli/commands/agent/context.py
        notes: "2 hits."
      - id: cs-005
        file: src/specify_cli/cli/commands/agent/mission.py
        notes: "CORRECTION (adversarial review): mission.py has NO `--feature` typer.Option. The 1 hit at L3622 is a help-HINT STRING `finalize-tasks --feature {mission_slug}` → fix to `--mission {mission_slug}`. DO NOT touch the `feature`-named params (bound to `--mission`) or the `--mission-type`/`--mission` resolve_selector at L1484. This is a user_facing_strings edit, not an option removal."
      - id: cs-006
        file: src/specify_cli/cli/commands/charter/lint.py
        notes: "2 hits."
      - id: cs-007
        file: src/specify_cli/cli/commands/materialize.py
