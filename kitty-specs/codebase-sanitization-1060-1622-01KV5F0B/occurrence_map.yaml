# Bulk-edit occurrence map — remove the hidden `--feature` CLI alias from the
# INTERNAL/AGENT command cluster (#1060-A, epic #1797).
#
# Mission: codebase-sanitization-1060-1622-01KV5F0B
# Change mode: bulk_edit (declared in meta.json)
# Operation: remove (the token is deleted, not renamed; `--mission` already exists)
#
# Action vocabulary (enforced by the bulk-edit gate):
#   - rename                 : substitute the literal token
#   - rename_if_user_visible : substitute only on a public surface
#   - manual_review          : implementer inspects and removes per occurrence
#   - do_not_change          : preserve as-is (out of scope or N/A)
#
# This is a REMOVAL, so in-scope categories use `manual_review`: the implementer
# deletes the `--feature` option + its plumbing while preserving the `--mission`
# path and leaving the shared resolver intact for out-of-scope commands.

