    to: docs/operations
    reason: >-
      Durable dev/ops docs -> operations/guides/configuration per A's ADR;
      ephemeral tracking docs -> plans. Re-section within docs/, not a
      cross-root move (durable-vs-ephemeral split resolves #2054).

  # --- Shadow trees (FR-008) ---
  - from: ["docs/3x"]
    to: docs/context
    reason: >-
      LIVE charter content (charter-overview.md, governance-files.md,
      index.md) — DISTIL + MOVE + REDIRECT, never blind-delete (C-004). Fix
