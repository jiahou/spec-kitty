    reason: "Audience personas -> context section."
  - from: ["glossary/contexts"]
    to: docs/context
    reason: >-
      Glossary -> context (FR-009). C-006: preserve the dashboard
      .kittify/glossaries/*.yaml read-path AND the doctrine-extraction source;
