      #2053 (coordinate only).

  # --- docs/architecture orphans: verify-before-delete (FR-008, C-004) ---
  - from:
      - docs/architecture/adr-connector-auth-binding-separation.md
      - docs/architecture/adr-github-app-installation-authority.md
    to: docs/adr/3.x
    reason: >-
      2 connector-auth ADRs among the 4 orphans — promote to canonical adr/3.x
      (verify-before-delete). The other 2 orphans (feature-detection.md,
