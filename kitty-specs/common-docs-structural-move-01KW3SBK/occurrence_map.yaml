  # --- CHANGELOG -> changelog/ (FR-009) — RELOCATE-WITH-ALIAS ---
  - from: ["CHANGELOG.md"]
    to: docs/changelog
    kind: relocate-with-alias
    reason: >-
      CANONICAL copy lands in docs/changelog (13-section structure); the repo
      root CHANGELOG.md PERSISTS as an alias/copy so release tooling keeps
      reading it at root — scripts/release/, pyproject.toml, and
      .github/release-readiness.yml all read root CHANGELOG.md and are
      out-of-relocate-scope (not re-pointed). The two copies are kept in sync;
      root is the alias, docs/changelog is canonical.

  # --- DocFX manifest + TOC rewrite (FR-007) — config, rewritten in place ---
  - from: ["docs/docfx.json", "docs/llms.txt"]
    to: docs
    reason: >-
      Not relocated — content globs + llms.txt entries REWRITTEN in place to
      the 13-section layout (serialized_keys: manual_review). Listed here to
      mark them as reviewer-approved touch points of the restructure.

  # --- Divio → 13-section re-section (FR-009) — IC-01 CORRECTION (was MISSING) ---
  # The existing docs/ Divio dirs (how-to/reference/explanation/tutorials/recovery)
  # are PUBLISHED (120 of WP02's 168 baseline URLs) but the original moves: spine
  # had NO entries for them, so they would orphan and guides/api would stay empty.
  # FR-009 mandates the mapping. Executed by WP16; redirect_map regenerates to cover
  # these (published → redirect stubs required, NFR-002).
  - from: ["docs/how-to", "docs/tutorials"]
    to: docs/guides
    reason: >-
      Divio how-to + tutorials (task- and learning-oriented) -> docs/guides
      (FR-009). Published URLs -> redirect stubs required (WP16 regenerates the
