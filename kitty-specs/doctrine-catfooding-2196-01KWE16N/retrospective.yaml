gaps:
- id: g-101
  category: tooling
  summary: charter CLI is not worktree-aware
  details: 'WP13 (capstone) had to monkey-patch find_repo_root + set PYTHONPATH to
    run `charter activate`/`generate` inside a lane worktree, because the CLI resolves
    to the main repo root. Capstone WPs that must run charter machinery in a lane
    are blocked without this hack. Fix: make charter activate/generate accept/resolve
    a worktree root.'
- id: g-102
  category: tooling
  summary: cycle-1 approval does not persist an approved review-cycle artifact (=>
    REJECTED_REVIEW_ARTIFACT_CONFLICT at merge)
  details: 'When a WP is rejected then re-approved via move-task, the latest on-disk
    review-cycle-N.md stays ''rejected''; merge''s terminal_wp_latest_review_artifact_must_not_be_rejected
    invariant then blocks. Had to hand-write approved review-cycle-2.md for 7 WPs.
    Already filed upstream as #2275; re-confirmed here.'
- id: g-103
  category: process
  summary: per-WP doctrine gates do not strict-parse artifact YAML
  details: 'WP06''s 045 shipped with an invalid-YAML bare-backtick sequence item and
    PASSED its review — terminology guard greps, test_shipped_graph_valid reads the
    committed graph, doctor loads leniently. The invalid YAML only surfaced at WP12''s
    `regenerate-graph` (first strict full-parse). Fix: add `spec-kitty doctrine regenerate-graph
    --check` (or yaml.safe_load) to the conversion-WP DoD.'
- id: g-104
  category: process
  summary: doctrine reviews must run the FULL test_tactic_compliance suite
  details: WP02 was approved with a root-vs-step duplicate reference because its first
    review ran only the schema-valid + terminology subset; the full test_tactic_compliance.py
    (test_root_references_not_repeated_in_steps) — added to later reviews — caught
    it during WP03's review. Make the full compliance suite mandatory in doctrine-artifact
    reviews.
- id: g-105
  category: tooling
  summary: charter generate closure is directive-reachable-only
  details: '`charter generate` renders only the transitive closure walked forward
    from selected directives. Doctrine artifacts whose DRG edges point UP to directives
    (procedure requires directive, tactic suggests directive) or that form non-directive
    clusters never render, even when activated. 6 of 14 catfooding artifacts are thereby
    governed-but-not-charter-referenced. NFR-003 was narrowed accordingly; a follow-up
    should add directive->artifact suggests edges (or teach the compiler to render
    directly-selected artifacts).'
