# Spec Kitty Canonical Terms
# This file defines the authoritative meanings of Spec Kitty domain concepts.

terms:

  - surface: action context
    definition: Aggregated runtime information resolved for a specific agent action, including feature slug, work package ID, base branch, workspace path, and dependency state. Passed to agents at step boundaries.
    confidence: 0.95
    status: active

  - surface: advise mode
    definition: An execution mode in which the harness proposes answers to interview questions for mission owner confirmation, without acting autonomously. The mission owner retains final authority on every decision.
    confidence: 0.75
    status: draft

  - surface: agent skills
    definition: The skills-first agent command discovery model in which capabilities are installed as skill packages under .agents/skills/ and resolved at runtime by name.
    confidence: 0.9
    status: active

  - surface: base branch
    definition: >
      At the mission level (branch-context output): alias for target_branch — the branch the
      mission is rooted in. At the worktree/WP level (WP prompt frontmatter): the specific git
      branch from which the individual lane worktree was created; may be a lane branch (e.g.
      kitty/mission-010-feature-lane-a) rather than the target branch itself. The same key
      therefore has different scopes: in branch-context JSON base_branch == target_branch;
      in WP frontmatter base_branch records the worktree's immediate parent.
    confidence: 0.9
    status: active

  - surface: branch strategy gate
    definition: >
      The mission-create guard for PR-bound missions that requires an explicit operator or agent
      decision before planning artifacts are written on a primary branch. Interactive callers may
      confirm at the prompt; non-interactive callers record the already-made decision with
      --branch-strategy already-confirmed. When the recommended feature-branch path is chosen,
      pass --start-branch so the CLI switches before scaffold writes.
    confidence: 0.95
    status: active

  - surface: build
    definition: One checkout or worktree of one repository with its own execution context.
    confidence: 1.0
    status: active

  - surface: build_id
    definition: Per-checkout/worktree identity, unique per working tree. Unchanged from pre-081.
    confidence: 1.0
    status: active

  - surface: bulk edit
    definition: A codebase-wide mechanical rename or terminology migration tracked as a mission with change_mode set to bulk_edit. Governed by the occurrence classification guardrail workflow.
    confidence: 0.95
    status: active

  - surface: catastrophic backtracking
    definition: |
      A regular-expression engine failure mode in which a vulnerable pattern combined with
      adversarial input drives matching time into exponential or polynomial complexity.
      Backtracking engines (Python `re`, JavaScript, Java, .NET) attempt every possible
      partition of the input when a match fails; patterns with nested or consecutive
      non-possessive repetitions can produce O(2^N) or O(N^c) retry storms. The
      `secure-regex-catastrophic-backtracking` tactic at
      `src/doctrine/tactics/shipped/secure-regex-catastrophic-backtracking.tactic.yaml`
      codifies the four dangerous-shape patterns, the rewrite ladder (bound quantifier →
      refactor nested → possessive/atomic group → negated char class), and the escape
      hatches (drop the regex, re2, multi-pass, bounded-input cap). Every fix requires a
      wall-clock regression test asserting linear runtime on an adversarial input
      (default budget: ≤100 ms for 100 000 chars), per FR-008. Synonym "ReDoS"
      (Regular-expression Denial of Service) is acceptable only as a parenthetical.
    confidence: 0.95
    status: active
    see_also:
      - tactic: secure-regex-catastrophic-backtracking
        path: src/doctrine/tactics/shipped/secure-regex-catastrophic-backtracking.tactic.yaml
      - fr: FR-008
        description: Wall-clock regression test requirement for every regex change

  - surface: ceremony commit
    definition: "DEPRECATED. Replaced by `status commit`. This term obscures intent and is forbidden in active source. See the canonical `status commit` entry."
    confidence: 1.0
    status: deprecated

  - surface: change mode
    definition: "A mission-level metadata flag (change_mode: bulk_edit) that activates the bulk-edit guardrail workflow, requiring an occurrence map before any work package may be approved."
    confidence: 0.95
    status: active

  - surface: charter
    definition: "A governance document synthesizing a project's purpose, constraints, team norms, and doctrine into a durable reference artifact. Produced by the charter interview workflow."
    confidence: 0.95
    status: active

  - surface: characterization test
    definition: |
      A test that captures the observable behavior of existing code as fixture-driven assertions,
      written before any refactor of that code. The refactor must leave the characterization test
      green. See the `tdd-red-green-refactor` tactic. Distinguished from snapshot tests (overloaded
      term) and regression tests (too broad).
    confidence: 0.95
    status: active

  - surface: charter lint
    definition: Graph-native decay detection that validates the internal consistency and freshness of doctrine artifacts in the doctrine reference graph. Identifies stale references, missing edges, and definition drift.
    confidence: 0.75
    status: draft

  - surface: conflict prediction
    definition: A dry-run forecast of which files will conflict and which conflicts are auto-resolvable, produced before a merge begins to help the mission owner decide whether to proceed.
    confidence: 0.6
    status: draft

  - surface: current branch
    definition: >
      The git branch checked out in the main repository at the moment a spec-kitty workflow
      command (specify, plan, tasks, implement) is invoked. Read ephemerally from the working
      tree; never persisted in any mission artifact. Exposed as current_branch / CURRENT_BRANCH
      in branch-context JSON output. Since WP07 (FR-012), spec-kitty refuses to derive the
      mission target from current_branch — it reads target_branch from meta.json instead, so
      the branch contract is stable regardless of which branch the operator is on when driving
      the mission.
    confidence: 1.0
    status: active

  - surface: decision moment
    definition: A local CLI artifact representing a choice point in an interview flow (charter, specify, or plan) where the mission owner or a delegated agent must provide input before the flow can continue.
    confidence: 0.75
    status: draft

  - surface: deliberate linearity
    definition: |
      A function whose body is intentionally kept long-and-linear (rather than extracted into
      named helpers) for traceability against a documented contract, code-review map, or
      output-section sequence. Deliberate linearity functions are NOT refactor candidates
      regardless of Sonar S3776 score. Identified by an explicit code comment justifying the
      structure and/or a published output-section contract that reviewers verify line-by-line.
      Refactoring a deliberately linear function without updating its contract is a regression
      in traceability. Canonical example: `src/specify_cli/cli/commands/_auth_doctor.py::render_report`
      (CC 53; intentional 7-section layout). Distinct from structural debt.
    confidence: 0.95
    status: active

  - surface: diff compliance gate
    definition: The review-time check that validates a work package diff against its occurrence map. Blocks approval if uncategorized or improperly changed occurrences are found.
    confidence: 0.95
    status: active

  - surface: directive
    definition: A doctrine artifact encoding a specific governance rule or constraint. The primary building block of project doctrine; referenced by agent profiles and action scopes.
    confidence: 0.95
    status: active

  - surface: doctrine
    definition: The body of project-specific governance artifacts — directives, tactics, and styleguides — that shape how agents and humans collaborate on a project.
    confidence: 0.95
    status: active

  - surface: doctrine reference graph
    definition: "The directed graph of interconnected doctrine directives, tactics, and styleguides that defines a project's governance structure. Abbreviated as drg. Edges encode requires, suggests, and replaces relationships between nodes."
    confidence: 0.95
    status: active

  - surface: drg
    definition: "Abbreviation for doctrine reference graph — the directed graph of interconnected governance artifacts (directives, tactics, styleguides) defining a project's doctrine."
    confidence: 1.0
    status: active

  - surface: evidence bundle
    definition: The set of inputs provided to charter synthesis — code-reading signals, configured URLs, and bundled corpus snapshots. Determines what the harness can reason about when generating doctrine artifacts.
    confidence: 0.75
    status: draft

  - surface: feature slug
    definition: Human-readable, kebab-cased identifier for a feature, used in branch names, directory paths, and artifact keys. Derived from mission_slug in feature missions.
    confidence: 0.95
    status: active

  - surface: feature branch
    definition: >
      A dedicated git branch for PR-bound mission planning and implementation work, typically named
      feat/<slug> for feature work or fix/<slug> for bug-fix work. It is distinct from the primary
      branch and is the recommended start point when a mission is expected to become a pull request.
    confidence: 0.95
    status: active

  - surface: friendly_name
    definition: The human-readable title string of a mission, used for display in dashboards and logs. Mutable — changing it does not affect routing or identity.
    confidence: 1.0
    status: active

  - surface: glossary chokepoint
    definition: The middleware enforcement point in the agent pipeline where glossary semantic checks are applied before generation proceeds. Configured by the strictness setting.
    confidence: 0.75
    status: draft

  - surface: harness
    definition: "The host LLM or external system responsible for generating doctrine content during charter synthesis. Operates under a contract with spec-kitty's validation and staging pipeline; does not write artifacts directly."
    confidence: 0.9
    status: active

  - surface: implementation concern
    definition: Plan-level architectural unit of intent identified as IC-## in plan.md. An implementation concern captures purpose, requirements, affected surfaces, sequencing, and risks. It is not executable and is translated into one or more work packages by the tasks workflow.
    confidence: 1.0
    status: active

  - surface: lane
    definition: Work package lifecycle state. Canonical lanes are planned, claimed, in_progress, for_review, in_review, approved, done, blocked, and canceled. The alias doing means in_progress. approved means review passed and merge pending; done means merged/integrated.
    confidence: 1.0
    status: active

  - surface: approved
    definition: Work package lane meaning review passed, feedback resolved, and the WP is ready to merge. approved is not integrated and must not be treated as done. The merge workflow owns the approved -> done transition.
    confidence: 1.0
    status: active

  - surface: done
    definition: Work package lane meaning the WP has been merged/integrated into the mission target branch, or explicitly force-marked as integrated with evidence. Review approval alone is not done.
    confidence: 1.0
    status: active

  - surface: accepted work package
    definition: A WP counted by mission acceptance readiness because its lane is approved or done. Accepted does not imply done; approved accepted work packages remain merge-pending.
    confidence: 1.0
    status: active

  - surface: merge-pending work package
    definition: An approved WP that mission acceptance may count as accepted-ready but that has not yet been merged/integrated. Merge-pending WPs stay in the approved lane until the merge workflow records done.
    confidence: 1.0
    status: active

  - surface: dependency readiness
    definition: >
      The condition the dependency gate evaluates before a work package may be
      claimed or implemented: every WP listed in its ``dependencies`` frontmatter
      must be in the ``approved`` or ``done`` lane. ``approved`` is included
      deliberately — ``done`` is emitted only by the whole-mission merge, so
      requiring a dependency to be strictly ``done`` would deadlock every
      same-mission dependency chain (the dependent WP could never start, so the
      mission could never merge, so the dependency could never reach ``done``).
      Computed by ``dependency_readiness_for_wp`` in
      ``src/specify_cli/core/dependency_graph.py``; intentionally matches the
      merge dependency gate (``policy/merge_gates.py`` treats ``{approved, done}``
      as satisfied). ``for_review``, ``in_review``, ``blocked``, ``canceled``,
      and missing status are not ready.
    confidence: 1.0
    status: active

  - surface: dependency gate
    definition: >
      The pre-implementation enforcement point that refuses to start a work
      package until it meets dependency readiness (all declared dependencies are
      ``approved`` or ``done``). Enforced consistently at every claim path. The
      read-only surfaces — the ``next`` claim-discovery preview
      (``preview_claimable_wp``) and orchestrator-api ``list-ready`` — only ever
      surface ``planned`` candidates, so a dependency-blocked planned WP is simply
      withheld (preview returns ``dependencies_not_satisfied``; list-ready omits
      it). The imperative claim verbs — ``agent action implement``, the low-level
      ``implement`` command (before any workspace is created), and orchestrator-api
      ``start-implementation`` — additionally apply a resume guard: they enforce
      readiness only on the not-yet-started (``planned``/``claimed``) claim
      transition, so re-invoking implement on an already ``in_progress`` WP is a
      no-op resume, not a re-gated claim, and a dependency that later regresses out
      of ``approved``/``done`` does not block resuming in-flight work. On block the
      imperative verbs surface the stable ``dependencies_not_satisfied``
      reason/error code.
    confidence: 1.0
    status: active

  - surface: machine-level runtime
    definition: "The ~/.kittify/ directory on a developer's machine, containing templates, global agent configs, and skills shared across all projects on that machine. Distinct from the per-project .kittify/ directory."
    confidence: 0.95
    status: active

  - surface: main repo
    definition: "DEPRECATED ambiguous phrase. It conflates checkout location with branch choice. Use 'repository root checkout' for location or the explicit branch term you mean."
    confidence: 1.0
    status: deprecated

  - surface: main repository
    definition: "DEPRECATED ambiguous phrase. It conflates checkout location with branch choice. Use 'repository root checkout' for location or the explicit branch term you mean."
    confidence: 1.0
    status: deprecated

  - surface: main repository root
    definition: "DEPRECATED ambiguous phrase. It conflates checkout location with branch choice. Use 'repository root checkout' for location or the explicit branch term you mean."
    confidence: 1.0
    status: deprecated

  - surface: merge state
    definition: The persistent JSON artifact (.kittify/merge-state.json) tracking progress of a resumable multi-work-package merge operation. Allows an interrupted merge to be restarted without data loss.
    confidence: 0.75
    status: draft

  - surface: merge_target_branch
    definition: >
      The branch where completed work-package code must ultimately land. Stored in every WP
      prompt's frontmatter (alongside planning_base_branch) to give implementing agents an
      explicit merge destination. In meta.json: legacy alias for target_branch, read as a
      fallback by resolve_planning_branch_from_meta() when target_branch is absent (pre-WP03
      missions). In 3.x all three — target_branch, planning_base_branch, and
      merge_target_branch — carry the same value; the separation makes intent explicit in
      agent-facing prompts and prevents the "prep branch leak" (pre-WP07 pattern in which
      finalize-tasks inherited the current branch instead of the persisted target).
    confidence: 1.0
    status: active

  - surface: mid8
    definition: The first 8 characters of a mission_id, used as a compact disambiguator in branch names and worktree paths. Not a stable identity on its own — always paired with mission_slug.
    confidence: 1.0
    status: active

  - surface: migration
    definition: A versioned, idempotent transformation that upgrades project filesystem state from one spec-kitty version to another. Migrations are applied in sequence and must not be re-applied once completed.
    confidence: 0.95
    status: active

  - surface: minimal viable trail
    definition: The minimum auditable artifact trail that every spec-kitty action is required to leave, scaled to action weight. Lightweight actions leave a log entry; heavy actions leave provenance sidecars and durable state artifacts.
    confidence: 0.75
    status: draft

  - surface: mission
    definition: Purpose-specific workflow machine with defined inputs, process, outcomes, and states
    confidence: 1.0
    status: active

  - surface: mission_id
    definition: The ULID-based canonical, immutable machine identity for a mission, assigned at creation and used for all event routing and disambiguation. Never displayed as a mission number.
    confidence: 1.0
    status: active

  - surface: mission_number
    definition: A display-only sequential integer assigned to a mission at merge time. Never used for lookup, locking, or event routing — use mission_id for those purposes.
    confidence: 1.0
    status: active

  - surface: mission_slug
    definition: The human-readable kebab-cased identifier for a mission (e.g., my-feature), used alongside mid8 in branch and worktree names. Chosen by the mission owner at creation.
    confidence: 1.0
    status: active

  - surface: node_id
    definition: Stable machine fingerprint (12-char hex). Unchanged from pre-081.
    confidence: 1.0
    status: active

  - surface: occurrence classification
    definition: The act of categorizing each instance of a changing string by semantic context — source code, import paths, serialized keys, CLI commands, documentation, and so on. Required before bulk-edit work packages are approved.
    confidence: 0.95
    status: active

  - surface: occurrence map
    definition: A mission-level artifact (occurrence_map.yaml) that classifies every occurrence of a changing identifier by semantic context. Required before any bulk-edit work package may proceed.
    confidence: 0.95
    status: active

  - surface: plan_concern_refs
    definition: Field in wps.yaml work package entries listing the IC-## implementation concerns from plan.md that the work package addresses. The field is wps.yaml-only and must not be copied into WP prompt frontmatter.
    confidence: 1.0
    status: active

  - surface: phase
    definition: Grouping container for mission primitives, not the enforcement unit
    confidence: 1.0
    status: active

  - surface: pipeline-shape
    definition: |
      A classification label applied to a function whose body is a sequence of independent
      decisions over a shared input. Pipeline-shape functions are the principal refactor target
      for the `chain-of-responsibility-rule-pipeline` tactic. The shape marker is "3+ independent
      decisions over a common input" — not "function is long". Distinct from deliberate linearity,
      where the sequential structure is intentional and documented. See
      `docs/architecture/04_implementation_mapping/code-patterns.md` entry 1.
    confidence: 0.9
    status: active

  - surface: planning repository
    definition: "DEPRECATED alias for 'repository root checkout'. Do not use — agents interpret this as a separate repository. Use 'repository root checkout' instead."
    confidence: 1.0
    status: deprecated

  - surface: planning_base_branch
    definition: >
      The branch that was active in the repository root checkout when WP prompts were generated
      (at finalize-tasks time). Stored in every WP prompt's frontmatter and in lanes.json to
      root lane-worktree allocation correctly regardless of which branch the operator is on
      when running finalize-tasks. In 3.x equals target_branch. Introduced alongside
      merge_target_branch to close the "prep branch leak" bug (pre-WP07): when finalize-tasks
      ran from a temporary prep/... branch, that branch leaked into WP frontmatter and crashed
      lane allocation once the prep branch was deleted.
    confidence: 1.0
    status: active

  - surface: preflight validation
    definition: Pre-merge checks that verify all resolved execution workspaces are clean and ready before a merge operation begins. A failing preflight check blocks the merge entirely.
    confidence: 0.75
    status: draft

  - surface: primary branch
    definition: >
      The repository's default integration branch, normally resolved from origin/HEAD and commonly
      named main, master, or develop. The specify branch-context output exposes this value as
      primary_branch only for branch-strategy recommendation; it is not automatically the mission's
      target_branch once target_branch has been persisted in meta.json.
    confidence: 0.95
    status: active

  - surface: primitive
    definition: Custom mission-defined executable operation or step unit
    confidence: 1.0
    status: active

  - surface: project
    definition: SaaS collaboration surface grouping one or more repositories. Not the local Git resource.
    confidence: 1.0
    status: active

  - surface: project root checkout
    definition: "DEPRECATED (mission 081): Use 'repository root checkout' instead. The non-worktree checkout at the root of the current repository."
    confidence: 1.0
    status: deprecated

  - surface: project_uuid
    definition: Optional SaaS-assigned collaboration identity. Absent until a repository is bound to a SaaS project. Never locally minted.
    confidence: 1.0
    status: active

  - surface: pr-bound mission
    definition: >
      A mission expected to land through a pull request rather than direct work on the primary
      branch. During mission create, --pr-bound activates the branch strategy gate so the branch
      choice is explicit before planning artifacts are written.
    confidence: 0.95
    status: active

  - surface: provenance
    definition: A record of what generated a given artifact — the actor identity, timestamp, and source (seed file, user clarification, or LLM generation). Enables audit and reproducibility.
    confidence: 0.95
    status: active

  - surface: provenance sidecar
    definition: A metadata file co-located with a generated artifact, recording its synthesis provenance. Allows any artifact to be traced back to its origin without modifying the artifact itself.
    confidence: 0.95
    status: active

  - surface: repo_slug
    definition: Optional owner/repo Git provider reference (e.g. Priivacy-ai/spec-kitty). Unchanged from pre-081 meaning.
    confidence: 1.0
    status: active

  - surface: repository
    definition: Local Git resource (one .git directory) holding mission artifacts. Formerly called "project" in pre-081 code.
    confidence: 1.0
    status: active

  - surface: repository root checkout
    definition: The non-worktree checkout at the root of the current repository. Planning commands (specify, plan, tasks) run here. It is a location, not a branch name.
    confidence: 1.0
    status: active

  - surface: repository_label
    definition: Human-readable repository display name derived from git remote or directory name. Mutable, not a stable identity. Was called project_slug before mission 081.
    confidence: 1.0
    status: active

  - surface: repository_uuid
    definition: Stable local repository identity, minted once per repository. Required namespace key for body sync and dedup. Was mislabeled as project_uuid before mission 081.
    confidence: 1.0
    status: active

  - surface: rule pipeline
    definition: |
      A pipeline of small pure functions, each checking applicability, optionally executing its
      narrow piece of work, and returning a result threaded to the next function. Three flavors are
      recognized in this codebase: Validator (accumulating `list[Finding]`), Transformer (chained
      `(state, actions, error?)`), Scorer (weighted `float`). The Transformer flavor is implemented
      in `src/specify_cli/migration/canonicalization.py::CanonicalRule` and consumed by
      `mission_state.py::_canonicalize_status_row` and `rebuild_state.py`. See the
      `chain-of-responsibility-rule-pipeline` tactic and the code-patterns catalog at
      `docs/architecture/04_implementation_mapping/code-patterns.md` entry 1.
    confidence: 0.95
    status: active

  - surface: scope
    definition: Bounded semantic scope (mission_local, team_domain, audience_domain, spec_kitty_core)
    confidence: 1.0
    status: active

  - surface: semantic conflict
    definition: Mismatch or ambiguity in term usage with assigned severity score
    confidence: 1.0
    status: active

  - surface: skill
    definition: A markdown file encoding a domain-specific agent workflow, discoverable as a named command. Skills are the primary unit of reusable agent capability in spec-kitty.
    confidence: 0.95
    status: active

  - surface: skill package
    definition: A self-contained agent capability directory with a SKILL.md descriptor, installable under .agents/skills/. Provides the discoverable packaging format for a skill.
    confidence: 0.95
    status: active

  - surface: sonar quality gate
    definition: |
      The SonarCloud project-level pass/fail evaluation for `Priivacy-ai_spec-kitty` on the
      new-code window. Aggregates six conditions (reliability rating, security rating,
      maintainability rating, new coverage, new duplicated lines density, new security hotspots
      reviewed). Reports `OK` or `ERROR` per condition plus a top-level status. Pulled via the
      public REST API at `https://sonarcloud.io/api/qualitygates/project_status`; the helper
      `work/snippets/sonarcloud_branch_review.sh` formats this for terminal use. Thresholds (as
      of 2026-05-14): new_reliability_rating GT 1 (A), new_security_rating GT 1 (A),
      new_maintainability_rating GT 1 (A), new_coverage LT 80%, new_duplicated_lines_density
      GT 3%, new_security_hotspots_reviewed LT 100%.
    confidence: 0.95
    status: active

  - surface: status commit
    definition: An auto-commit created by spec-kitty to record workflow state changes (task status transitions, lane metadata, WP claims). Status commits target lane branches, not protected branches.
    confidence: 0.95
    status: active
    synonyms_to_avoid: [ceremony commit, ceremony, ceremony write, status-writing operation, status-writing command]

  - surface: status-writing operation
    definition: "DEPRECATED. Replaced by `status commit`. This phrasing landed during a partial rename; it is forbidden in active source. See the canonical `status commit` entry."
    confidence: 1.0
    status: deprecated

  - surface: step contract
    definition: A formal specification of what a mission step must accomplish, including its inputs, outputs, and success criteria. The reviewer uses the step contract to validate work package completion.
    confidence: 0.75
    status: draft

  - surface: strictness
    definition: Glossary enforcement mode (off, medium, max)
    confidence: 1.0
    status: active

  - surface: start branch
    definition: >
      The branch passed to mission create with --start-branch. The CLI creates or switches to this
      branch before writing mission scaffolding, and it must match --target-branch when both options
      are supplied so mission metadata and the checked-out branch describe the same planning branch.
    confidence: 0.95
    status: active

  - surface: structural debt
    definition: |
      A function whose cognitive complexity has accumulated beyond reviewable bounds AND whose
      responsibilities are independently dispatching concerns with no shared state between branches.
      A structural debt function is a refactor candidate per the `refactoring-extract-first-order-concept`
      and `refactoring-extract-class-by-responsibility-split` tactics. Distinguished from deliberate
      linearity by the *absence* of a documented design intent and by the presence of independent
      dispatch arms or triplicated patterns. Canonical example: `doctor.py::mission_state` at CC 57
      (three independent dispatch arms — `--audit`, `--fix`, `--teamspace-dry-run` — sharing no state
      after option parsing, plus triplicated JSON-vs-pretty emit logic). WP06 of mission
      `quality-devex-hardening-3-2-01KRJGKH` extracted it to a CC 3 thin orchestrator plus per-mode
      runners.
    confidence: 0.9
    status: active

  - surface: styleguide
    definition: A doctrine artifact specifying coding or writing conventions for a project. Applied during implementation and review to keep outputs consistent.
    confidence: 0.95
    status: active

  - surface: synthesis manifest
    definition: The authoritative commit marker written last during charter synthesis. Its presence and hash integrity indicate a complete, valid synthesis run. Absence or hash mismatch signals a partial or corrupted run.
    confidence: 0.95
    status: active

  - surface: tactic
    definition: A doctrine artifact describing a reusable workflow or procedure that agents follow to accomplish a specific class of task. Composed of ordered steps and cross-references.
    confidence: 0.95
    status: active

  - surface: target branch
    definition: >
      The git branch on which a mission's code, planning artifacts, and status events must
      ultimately land. Persisted in meta.json under the key target_branch at mission-create
      time and never overwritten. Read by resolve_planning_branch_from_meta() as the canonical
      key; merge_target_branch is its legacy alias in older meta.json fixtures. Since WP07
      (FR-012), all downstream commands — finalize-tasks, implement, review, merge — derive
      the branch contract from this stored value, not from the operator's current_branch at
      invocation time. In branch-context JSON output, target_branch and base_branch carry the
      same value when queried at the mission level.
    confidence: 1.0
    status: active

  - surface: teamspace
    definition: A shared workspace or channel used for collaborative input to spec-kitty decision moments, particularly in widen mode flows.
    confidence: 0.6
    status: draft

  - surface: widen mode
    definition: A CLI feature that allows a mission owner to escalate an interview question to a collaborative channel for group input, with the response written back into the local decision moment.
    confidence: 0.75
    status: draft

  - surface: work package
    definition: Execution slice inside a mission run, the unit of human/agent handoff
    confidence: 1.0
    status: active

  - surface: workspace
    definition: Git worktree directory created for implementing a work package
    confidence: 1.0
    status: active

  - surface: wp
    definition: Abbreviation for work package
    confidence: 1.0
    status: active

  # --- WP03: mission-review mode contract entries ---

  - surface: lightweight mode
    definition: "`spec-kitty review` invocation that performs consistency checks but is explicitly NOT a release gate. Skips dead-code and BLE001 audits; reports state with that limitation."
    confidence: 0.95
    status: active

  - surface: post-merge mode
