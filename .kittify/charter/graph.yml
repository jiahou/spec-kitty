- source: directive:DIRECTIVE_024
  target: directive:DIRECTIVE_025
  relation: replaces
  reason: The Boy Scout Rule endorses opportunistic improvement of touched areas,
    which can justify expanding a change beyond the strict locality boundary this
    directive enforces.
- source: directive:DIRECTIVE_025
  target: directive:DIRECTIVE_024
  relation: replaces
  reason: Locality of Change constrains the SCOPE of new work to the minimum the goal
    requires; it does NOT license leaving adjacent breakage in already-touched code.
    Campsite cleaning of touched-area failures is within locality; broad refactors
    are not. The two reconcile by fixing adjacent breakage by default while deferring
    genuinely broad refactors with a rationale.
