# Charter interview answers — Spec Kitty project
# Generated by WP13 (doctrine-catfooding-2196-01KWE16N) capstone compile;
# enriched by the interactive charter intake (2026-07-01) to state the
# Quality & Tech-Debt Standing Orders as actionable charter policy.
# Format: answers use free-text; selected_* use canonical artifact ID values
#         (YAML id: field for directives; artifact id for all other kinds).

mission: software-dev
profile: comprehensive

answers:
  project_intent: >
    Spec Kitty is a toolkit for Spec-Driven Development (SDD) — clear,
    actionable specifications ahead of implementation. Every change is
    governed by a charter that codifies architectural standards, quality
    gates, development workflow, and safety rules. The charter is the
    single source of truth for all agents and contributors, and Spec Kitty
    governs its own development with the doctrine it ships (catfooding).
  languages_frameworks: >
    Python 3.11+ for all CLI and library code. Key dependencies: typer,
    rich, ruamel.yaml, pytest, mypy (strict mode). Cross-platform: Linux,
    macOS, Windows 10+.
  testing_requirements: >
    90%+ test coverage for new code. mypy --strict must pass. Integration
    tests for CLI commands; unit tests for core logic. Run only the affected
    test packages for scoped changes; full suite reserved for mission-level
    validation, cross-cutting changes, and release candidates. Parallel runs
    via pytest-xdist with --dist loadfile.
    Test-remediation discipline: judge the test, not git-blame — a failing test
    is stale (re-pin the assertion), a stub/scaffold (delete it), or valid (the
    product is wrong — fix the product); never retry-to-green or soften a good
    test (DIRECTIVE_041). Reproduce bugs RED-FIRST through the pre-existing entry
    point, not the fix's not-yet-written API (DIRECTIVE_034). A bug is not fixed
    until a live run proves it — code that "looks fixed" is not evidence. Use
    production-shaped test data, not handcrafted placeholders.
  quality_gates: >
    Required pytest surface green; mypy --strict; ruff; no regressions;
    documentation updated. Sonar: complexity ceiling 15; no empty exception
    handlers; repeated non-trivial literals become constants.
    Close defect classes by construction: when a defect class is "a convention
    every caller must remember", add an architectural call-site gate (e.g. AST
    based) rather than more discipline (DIRECTIVE_043). Every such gate must be
    NON-VACUOUS — a concrete floor (a real integer, never self-referential), a
    self-mutation test (inject a violation → gate fails → revert → passes), and a
    shrink-only allowlist against a frozen pre-sweep baseline with recorded
    rationale per exception (architectural-gate-non-vacuity +
    frozen-baseline-shrink-only-ratchet tactics). A gate-unmask cannot
    self-validate: pair every un-mask with a pre-merge full-gate dry-run.
  review_policy: >
    1 approval required; CI + pre-commit hooks must pass; all changes land via
    pull request — no direct pushes to main. Reviewer and implementer are DISTINCT
    roles/profiles — a work package is reviewed by an independent reviewer, never
    self-approved (reviewer-implementer-role-separation). Run a bounded,
    profile-loaded adversarial squad at every planning point-cut (pre-spec /
    post-spec / post-plan / post-tasks) BEFORE proceeding — one lens per agent,
    strongest model for the hard lenses; it reliably catches undersizing (often
    4-5x) and fakeable acceptance criteria while they are still cheap prose
    (adversarial-squad-cadence; optional/advisory, never a hard gate). Give
    implementers rationale-backed leeway to edit outside their declared owned_files
    — the no-overlap rule between work packages is the real guard against parallel
    collisions, not a strict prohibition (ownership-map-leeway).
  performance_targets: >
    CLI operations < 2 seconds for typical projects. Dashboard supports
    100+ work packages without lag. No unnecessary git clones/checkouts.
  deployment_constraints: >
    Cross-platform: Linux, macOS, Windows 10+. Python 3.11+. Git required.
    PyPI distribution via automated release workflow.
  documentation_policy: >
    CLI commands must have clear help text with examples. Public APIs need
    docstrings. Breaking changes documented in CHANGELOG.md. Architecture
    decisions captured in ADRs under docs/adr/3.x/. Use CANONICAL sources —
    doctrine templates, skills, and CLI commands — never improvise or copy an
    older mission; chase unification (one canonical surface authority), not parity
    with a lacklustre quirk; a missing or broken command is a gap to trace and file
    upstream, not to route around (DIRECTIVE_044). Guard the terminology canon
    before pushing doctrine or user-facing prose (terminology-guard). Seed three
    mission tracer files (tooling-friction, approach, design-decisions) at planning,
    append them during implementation, and assess them at close so friction and
    rationale feed the next mission's planning (mission-tracer-files procedure). For
    ticket-based missions, every addressed issue gets an issue-matrix row, a claim,
    and a tracker comment naming the mission; meta/convenience rollups reference work
    via checklist and are never the canonical parent of a functional ticket
    (planning-and-tracking styleguide).
  risk_boundaries: >
    Do not relax quality, security, or architecture standards without explicit
    maintainer approval. Never push directly to origin/main; agents must not skip
    hooks or bypass signing. Leave the campsite cleaner than you found it WITHOUT
    inflating scope — fold only domain-matched debt at each planning point-cut, and
    freeze current offenders as a baseline when a litter class cannot be cleared
    in-mission (DIRECTIVE_025). Read the mission spec/intent before any merge,
    rebase, or deletion; never delete a test to make a build pass; escalate when
    unsure — correctness over speed. Any agent that reviews or rebases a PR runs in
    an ISOLATED worktree so it cannot stage the PR diff into the active mission
    checkout (pr-agent-worktree-isolation). After merging, run the FULL
    architectural-gate sweep on the merged branch before opening the PR; verify any
    "pre-existing" failure via a cross-base diff (the lane base is not the mission
    base) and run the CI-only shards (integration/git) locally
    (post-merge-arch-gate-adjudication).
  amendment_process: >
    Any maintainer can propose amendments via pull request; major architectural
    changes require an ADR + reviewed PR; charter violations are flagged and
    addressed before merge. PRs only — the operator merges manually; agents prepare
    merge-ready (green CI, un-drafted, issues linked) and hand off, never merging to
    protected main themselves. Do not assign version/patch numbers during planning —
    versions are superimposed at release time (DIRECTIVE_045). Collaboration strategy:
    the operator dispatches a governed orchestrator (planner-priti, profile-loaded) to
    claim + plan + run the mission; work opens as a DRAFT PR (history compressed) and is
    marked ready-for-review only when self-review (adversarial pass) AND CI pass; the
    operator merges.
  exception_policy: >
    Exceptions discussed case-by-case; strong justification required. When
    exceptions become common, update the charter instead of creating more
    exceptions. Allowlisted gate exceptions are shrink-only and each carries a
    recorded rationale.

