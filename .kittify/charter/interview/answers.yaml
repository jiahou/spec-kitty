# Format: answers use free-text; selected_* use canonical artifact ID values
#         (YAML id: field for directives; artifact id for all other kinds).

mission: software-dev
profile: minimal

answers:
  project_intent: >
    Spec Kitty is a toolkit for Spec-Driven Development (SDD) — clear,
    actionable specifications ahead of implementation. Every change is
    governed by a charter that codifies architectural standards, quality
    gates, development workflow, and safety rules. The charter is the
    single source of truth for all agents and contributors.
  languages_frameworks: >
    Python 3.11+ for all CLI and library code. Key dependencies: typer,
    rich, ruamel.yaml, pytest, mypy (strict mode). Cross-platform: Linux,
    macOS, Windows 10+.
  testing_requirements: >
    90%+ test coverage for new code. mypy --strict must pass.
    Integration tests for CLI commands; unit tests for core logic.
    Run only the affected test packages for scoped changes; full suite
    reserved for mission-level validation, cross-cutting changes, and
    release candidates. Parallel runs via pytest-xdist with --dist loadfile.
  quality_gates: >
    Required pytest surface green; mypy --strict; ruff; no regressions;
    documentation updated. Sonar: complexity ceiling 15; no empty exception
    handlers; repeated non-trivial literals become constants.
  review_policy: >
    1 approval required. CI checks must pass. Pre-commit hooks must pass.
    All changes land via pull request — no direct pushes to main.
  performance_targets: >
    CLI operations < 2 seconds for typical projects. Dashboard supports
    100+ work packages without lag. No unnecessary git clones/checkouts.
  deployment_constraints: >
    Cross-platform: Linux, macOS, Windows 10+. Python 3.11+. Git required.
    PyPI distribution via automated release workflow.
  documentation_policy: >
    CLI commands must have clear help text with examples. Public APIs need
    docstrings. Breaking changes documented in CHANGELOG.md. Architecture
    decisions captured in ADRs under docs/adr/3.x/.
  risk_boundaries: >
    Do not relax quality, security, or architecture standards without
    explicit maintainer approval. Never push directly to origin/main.
    Agents must not skip hooks or bypass signing.
  amendment_process: >
    Any maintainer can propose amendments via pull request. Major
    architectural changes require an ADR + PR with review. Charter
    violations flagged and addressed before merge.
  exception_policy: >
    Exceptions discussed case-by-case; strong justification required.
    When exceptions become common, update the charter instead of creating
    more exceptions.

available_tools:
  - git
  - spec-kitty
  - pytest
  - mypy
  - ruff

