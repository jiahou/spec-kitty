- id: h-004
  category: process
  summary: Post-merge mission review caught a real cross-WP bug
  evidence_refs:
  - e-013
  details: Doctor-sweep closes were never propagated to SaaS (executor built without propagator). Every per-WP review missed
    it because the propagator was outside WP04 owned_files. Mission-level review is the only altitude that sees this class
    of gap.
not_helpful:
- id: n-001
  category: process
  summary: WP01 required 1 --force override(s) during workflow
  evidence_refs:
  - e-012
  details: WP WP01 required 1 operator-driven --force lane transition(s). Force overrides typically indicate the runtime guard
    failed or the operator routed around it; investigate the underlying cause.
- id: n-002
  category: tooling
  summary: Lane bases did not include approved dependency WPs
  evidence_refs:
  - e-011
  details: 'lanes were cut from the mission branch before dependency lanes merged back, so WP03/WP04/WP06 all started on bases
    missing their approved dependencies. Each needed manual or agent-driven lane-to-lane merges (lane-f even had to merge
    two lanes and resolve 4 conflicts). The dependency graph knows the order; implement should rebase/merge the lane base
    automatically. Related to upstream issue #771.'
- id: n-003
  category: tooling
  summary: Protected-branch guard in dogfooding repo forced constant workarounds
  evidence_refs:
  - e-016
  details: 'safe_commit refuses commits on local main, so spec/plan/tasks/analysis/acceptance bookkeeping bounced between
    root checkout, coordination branch, and coordination worktree all session. SPEC_KITTY_ALLOW_PROTECTED_BRANCH_COMMITS=1
    bypasses only one of the two guard classes (assert_not_protected_branch but not ProtectedBranchRefused in the safe_commit
    destination check), so the workaround is partial. Robert questions whether local-main protection is useful at all: the
    policy that matters is origin:main (PR-only, enforced by GitHub + CI). Conflating local:main with origin:main is the suspected
    root cause. DECISION INPUT: either honor the env var consistently in both guard paths, or drop local-main protection and
    rely on remote enforcement; always qualify main as local:main or origin:main in messages and docs.'
- id: n-004
  category: tooling
  summary: Status authority split between coordination worktree and root checkout
  evidence_refs:
  - e-011
  details: Dashboard and root-side readers consume the root checkout status files while lane/coord operations write the coordination
    worktree copies; the board went stale repeatedly until files were manually synced or merged. Readers should resolve status
    through the coordination worktree when one exists.
- id: n-005
  category: tooling
  summary: Mission merge required four manual interventions
  evidence_refs:
  - e-013
  details: (1) stale lane-c needed manual conflict resolution; (2) .kittify/metadata.yaml upgrade-noise blocked a lane merge;
    (3) the coord worktree fell behind its own branch mid-merge, tripping the safe_commit backstop twice; (4) post-merge baseline
    validation ran before the tool wrote the baseline_merge_commit field it validates, requiring manual meta.json repair.
    The merge succeeded but is not yet an unattended operation.
- id: n-006
  category: tooling
  summary: accept auto-commit fails through gitignored .worktrees path
  evidence_refs:
  - e-011
  details: spec-kitty accept resolved mission artifacts through the coordination worktree path (.worktrees/...) and tried
    to git-add them in the root repo where .worktrees is gitignored — TaskCliError. --no-commit succeeded; the write path
    needs to commit from inside the coord worktree or via repo-relative paths.
- id: n-007
  category: tooling
  summary: Tracked .worktrees junk committed again
  evidence_refs:
  - e-011
  details: A planning-artifact auto-commit swept 23 files under .worktrees/<coord>/ into the repo — second occurrence in history
    (prior fix commit 529a7b992). Whatever stages git add -A in the coord worktree needs a pathspec exclusion.
- id: n-008
  category: tooling
  summary: finalize-tasks/record-analysis surprised the orchestrator by switching branches
  evidence_refs:
  - e-011
  details: finalize-tasks checked out the target branch under the session, and record-analysis enforced repo-wide clean-tree
    including unrelated dirty files in other checkouts. Both behaviors are defensible but undocumented in the command prompts
    that drive them; the prompts should state the branch/cleanliness contracts.
