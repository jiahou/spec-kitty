    fill verdicts as WPs are approved.'
- id: g-002
  category: doctrine
  summary: 'FOLLOW-UP: Decide and document local-main protection policy (terminology: local:main vs origin:main)'
  evidence_refs:
  - e-016
  details: 'Follow-up from n-003. Options: (a) make SPEC_KITTY_ALLOW_PROTECTED_BRANCH_COMMITS govern both guard classes; (b)
